body:
  text: 三相違分二初四相次四式今初相違有四謂法自相相違因法差別相違因有法自相相違因有法差別相違因等法宗法也自體名自性自體上形相義相名自相有自相即有共相共相中有與自相異者名差別此四過皆著因者字謂能成彼相違義之因也自相相違全成異品遍有差別相違亦成異品少分有謂此因成此亦成彼也所言相違因之過其別有四所謂一者法自相相違因二者法差別相違因三者有法自相相違因四者有法差別相違因夫欲成立宗法而翻作成立相違之義此即十因中相違因所攝也護法云諸相違因若不違礙自共所許乃于自境能立相違自相差別按自相差別此四過能立是因相謂能成立相違因也故曰諸相違因問名相違與成相違因義何差別答敵體背謬名相違全扶敵體背謬之義成相違因譬如我兵對敵卒名相違我兵降彼助彼成相違因次四式分四今初式此中法自相相違因者如聲常所作性故或勤勇無間所發相故此因唯于異品中有是故相違法自相相違因全翻宗義此因能立異品之宗非止相違或異而已此因相違中所言法自相相違因者如有云聲有法常宗所作性故因或勤勇無間所發性故因云何知其是相違因謂此二因句于同品遍無唯于異品瓶等同法中遍有因能成立的對相違之法是故名為相違因也護法云又立常者所道理唯依異法無同法故所立不成此條而也龍樹亦云若法能成相違所立是相違過即名似因按此是攝四相違因當知但與宗違猶非四種所攝唯能成相違所立方是此相古疏云同品無處不成立者之宗異品有處翻成敵者相違之義是也此條乃聲明被破矯譎辭謂常無同品可喻可即異品以反顯其宗但𮗚所作性瓶等之無常可知聲常乃一切皆無常唯聲是常之論也初因遍非宗法性同品㝎無性異品遍有性次因則異品㝎有不遍有因之十四過中此過最大譬如對敵排陳前徒倒戈簡別高原直疏云如勤勇無間所發性故豈成非所作之常宗後文華舉所作性因唯異品無常中有似乎不會雙舉二因之意紹覺論解云今言常性言陳但顯不遷變義未暇廣顯真常邪常相續常凝然常等故言自相按自相二字龍樹作自性約體而言自性約義而言自相但舉常字即有常之自相何勞分陳真常邪常等倘違邪常自相亦成相違因此等簡別無益于解釋反多支離二楞庵主集釋申違量云聲有法是無常宗所作性故因或勤勇無間所發性故因同喻如瓶異喻如空按此量亦是犯過于宗犯能別不極成彼不許無常故于喻犯俱不成彼不許空是常故即三支成立亦犯相違決定乃以能立也第二式法差別相違因者如眼等必為他用積聚性故如卧具等此因如能成立眼等必為他用如是亦能成立所立法差別相違積聚他用諸卧具等為積聚他所受用故眼等等取五知根積聚者堆積聚集而成可分散者也卧具牀席衾茵也等等取衣車所立法即宗體所言法差別相違因者如有云眼等有法必為他用宗積聚性故因如卧具等喻云何知其差別相違謂此積聚性因本不能成假如許其能成立眼等必為他用既然如是亦能成立所立宗法上差別相違之積聚他用何以故他字義濶中非積聚他及是積聚他之差別積聚他與非積聚他敵體相違今現見諸卧具等同品為積聚他肢體所受用故夫欲成宗體而雜成共相中敵體相違之法是故名相違因也百論云迦毗羅言從冥生覺覺生我知從我知生五唯量從五唯量生五大五大生十一根神為主常覺相處中不壞不敗常住攝受諸法金七十論云云何知有有我頌曰積聚為他故異三德依故食者獨離故五因立有故首句釋云如人聚牀席等必為于人如是大等積聚即知有我按彼所計是非積聚之神我然積聚物等不止是非積聚者受用即積聚者亦能受用故因犯此過此條三支俱帶過論主引之只證此式之過不涉此式者且止不𠰥具之宗犯世間相違共許自受用故他字𠰥神我犯自語相違我為他故喻亦有過同品五唯積聚不必為他用犯能立法不成異法之不積聚虗空亦為他用犯同品遍轉異品一分轉犯隨一不成論主引此式只明因上犯過為此式作一樣子于宗喻之過俱略而不談為不涉本條者可略也文中此因如能成立云云蓋言量犯多過本不能成立設如彼意謂能成立亦犯此過亦能二字非無簡別問此條與共不定諸過請為分別明示答彼不㝎過係同異品俱轉此唯于同品中成差別相違法彼不㝎將因承宗有同異此是依宗中含因相反面故相違二字不因違于宗乃宗相中有違因之差別相在此差別相待因而顯故仍是因上之過此條設改作必為他神我用宗或作必為他不積聚性受用宗皆是共不定中過非此條式問此條闕因何相答聚初相最顯雖是遍許而雜許違因之義雖然遍攝而雜攝違因之相宗之同品則㝎有宗之異品則遍無簡別紹覺解云差別相者意許差別也謂如言火此燒然意遍于一切草木香𤇆火等意于其中的一火以為因量故言意許差別今言他用他義遍一切𠰥神我𠰥積聚皆攝于內今立因量不可通漫必𭚻的是何法故言差別相也量主意許凡宗皆是意許此意許差別𠰥差別在意許內此積聚他用量主非意許故𠰥在意許外前條不定過之凡異品轉者皆可名差別相違𠰥同異差別則頂骨淨等亦是差別相違瓶等常是意許內軍林等是意許外亦是差別相違𠰥是宗中之意許差別則無論意許不許凡有差別皆不可違又何必添此意許二字夫不積聚之神我是意許積聚物是意許差別如此作解則聲常亦是意許無常亦是意許之差別亦可名法差別相違矣表此意許二字甚無謂也設令彼量不作通慢語立為必為神我受用宗神我之同品可轉異品之積聚身亦轉亦犯不定過不以非通漫而無過也既云他義遍一切則自外皆他不簡人物事法而疏又云通餘人又云積聚有身之他即他人也則非遍一切矣眼外他眼亦互受用根清涼奚止他人也又云因既可成相違宗義則神我之宗不成矣義雖如是但彼量不止此一過又此因明論亦非未破外道不過借此摽一式耳不會此意解者多有粘滯又云而此卧具既不為神我所用乃成異喻安能證成神我宗此不是表喻過之式即或有過略而不論𠰥欲申明應作餘義辨又言陳但是必為他用故舉以證此式不淂出神我何消計及神我受用卧具秖要卧具是積聚性不能自用為他用便可為喻然神我亦能受用卧具神我能受用器世界而况卧具判作異喻實所不解又云問𠰥爾今應成立積聚他用此眼為他人用耶答此亦有過如人有眼等唯自己見聞之用豈能令他見色聞聲𠰥立為宗必違現量及自教等為破彼且作是答辭應云明他共許破彼因句非成立宗何須強詰若如上所答語皆犯過見聞之用是功用積聚之用是受用義已差訛他人浮塵根亦有染著受用義立言又謬此是比量無現量義世間所許不涉自教念西居士集解云此因與後陳宗法上意許差別之相相違也此中即借金七十論所計之立量以破之取其五大聚名身中眼一種為有法非為自用並是為他句為宗聚集句為因如牀席等為同喻夫眼與席非同類無論也眼之積聚不同牀席之積聚亦無論也今第就所謂他者辨之先曰非為自用必皆為人設則自他有辨矣後曰他者即是我則自他無辨矣欲成就身積聚則混自他而一之欲成就卧具積聚則析自他而二之豈非違乎自他即差別也故此積聚性之因如能成就眼等必為他用之宗法亦能成就此宗法差別相違之過何以故工匠之積聚牀席等專為積聚主人所受用故眼積聚性異熟長養俱不屬他人豈其類哉造牀織席亦有自用者為揀此一分故曰積聚他用諸卧具等申違量云眼等不為他用積聚性故喻如眼根有法是浮塵根喻是勝義根費許多周折投入諸過中會意一差遂至如此彼以自他為差別積聚物自他皆可受用無相違意眼以眼為自自外皆他非以人為自他人為他也眼根與牀席皆積聚性非異類工匠之積聚是功用非受用牀席等主客皆得受用非獨主人若言有匠人自造牀席受用義簡別他則積聚總作合材料義非積聚自性義俱不合正理安能消此式文量文眼等不為他用宗上犯世間相違積聚性故因上犯法自相相違喻如眼根猶如無喻前條雖變此然其自許二字以受用為功用皆由此條貽誤蕅益直解云彼謂積聚卧具等必為身用則積聚眼等亦必為神我受用數語合理若無神我何須積聚之身若無此身何須卧具此量但立積聚之為他用未𪠥立神我能受用義不得將金七十論作量文解彼論謂五唯等根源神我生若不受用彼等時神我仍在若無神我云云非彼計意又彼立量云眼等必為他神我所用宗因云眼等是積聚性故喻如卧具之必為身用量文中一字之增減義相遂殊如此量文增神我二字則他義屬神我所攝甚狹與原文之他大不同矣而核其宗之義相則重在名字名字為自相以必不為自相相違以不必為非遍是宗法性至于他神我又𪠥自神我之差別一經增改別成蕅量文與數論無預又喻上必為身用亦非彼意彼但有不自用為他用義若帶身字可攝有法上眼等彼不如是拙也凡欲破彼論先要審悉敵辭然後施設破辭若此等粗淺義相尚未了知安能成能破之量依此增改之量而以此論文破辭破之猶改病而用原方也于立方之意大相左矣又云約眼等則以神我為他約卧具又以眼等積聚身為他是一他字法上有二種差別之不同此解是破喻之辭與此式因過犯無涉之無益而其又有瑕疵可受用眼等之他所攝亦濶差別亦𪠥今專屬神我設未顯喻宗上已犯過失不消從卧具等破之也又云既積聚卧具但為積聚他用則積聚身又豈必為神我用哉設此果有神我而神我既不須卧具又何須身此數句無義理依其意則積聚身又別𪠥積聚性者受用邪卧具是喻不是宗自共相所攝若言神我不須卧具例于𪠥為法喻泡電豈𪠥為法𪠥泡影電光哉數論亦計積聚身不耽著則神我涅槃又何須身之句不中彼病又云若神我亦是積聚故名為他則是無常亦非真我彼無此意若神我非是積聚則不當用積聚眼等異熟識緣根身器𤰪則何以以積聚身乃須受用積聚物故六識三受又何以彼欲以此因成立神我為能用今即以此因成立積聚他為他用則神我不攻自破故名法差別相違也胸中橫破神我之見不顧量文如何改從己意費了許多言辭于此式無涉卒之彼論未能破反露己辭上多般敗闕可謂空費心思自投過網者矣致誤之由不知因明是立方隅並非是專破外小之論𮗚所別不極成一條外道對佛弟子辭亦列在式龍樹因明云如破數論我己廣辨故應且止廣諍謗論足見此論專明式樣不興諍論也又此三支之在宗言宗在喻言喻此式名曰法差別相違因但示因上之過但明法有差別除此以外皆不須及式外生枝節者皆非也高原直疏云法差別相違因者是諸法中有差別義因不能成為相違法字乃所立法即宗也言諸法者非也此因能成宗上差別相違義言因不能成者非也錯解式文義相于此塞矣又云以眼根等不自用故必眼等識以為根用故言必為他用推根之義有差別故所立之法應有差別根是相分為眼等識之所依識是見分為眼等根之所發相見各異故眼自積聚必為他識所用其自證分為相見分之體體持業用用不為他𣸪立宗云必不為他用云云相見四分至護法方立以前佛弟子尚無此况于佛前之數論別尋此頭腦以解此條彼不受自教亦不受其與此式義相差千里也一雨集解云論主不改其因申違量云云乃是翻同作異以他受用與他人受用是法差別故此由外道于無我計我故翻其所執之我而為非我所謂奪賊槍殺賊也集釋此解俱襲誤承謬不消駁難末數語乃彼自彼量文無神我字槍從何奪紹曇解云詰曰為如神我非積聚成立眼等非積聚性耶為如眼等有積聚成立神我亦是積聚性邪此乃蕅益後人守彼直解所此詰不合詰問此量之義非此條顯過之辭應云為如卧具是積聚性成立不積聚之他受用邪為如卧具是積聚性成立積聚之他受用耶積聚之身受用卧具世共許故人能解云積聚二字即法差別彼以神我為非積聚而因云積聚性故故名相違今以此因成立異品之他故名法差別相違宗上竟改作神我非積聚則與眼等必為他用義相迥別即如彼積聚二字是異品非止差別乃違宗自相之過正所謂成立異品之他也與此式無涉第三式有法自相相違因者如有性非實非德非業有一實故有德業故如同異性此因如能成實等如是應能成有性俱決定故有性者勝論所立大有性也不言大者有字攝故大有遍攝一切彼論名大有句遍攝一切即其自相宗上非字具二義一非即異實等故二非等顯大有故此是立之宗實等以表大有故下云成實等因上有字具二義一別有簡他性故二實有表自性故如同異性含二義一不即是實等顯別有二不離是實等顯所依不遍攝一切是自相相違因上能成此不遍攝法名有法自相相違因所言有法自相相違因者如有云大有性有法非實句非德句非業句宗有一實故有一德一業故因喻如同異性即其式也云何知其有法自相相違因謂此有一實等之因不能成則已如許能成此實等如是成法應能成有性何以故此因既顯一實等在宗上實等句之外則有性之不能遍攝實句等可知能成有性之不遍攝方名相違因也彼若決定成此亦決㝎成故云俱決定故勝論立六句一實二德三業四大有大有能遍攝實德業三句者謂別有一法為體非即是三句亦非離是三句第五同異句謂望同法為同望異法為異即一法而同異分可喻即實等而別有一實等也廣百論釋破勝論云又若實等與有性別應不能知實等是有若言實等雖非有性與有合故起有智者則實等法假名為𪠥體非真實應為無又云實等其體各異有性是同故與有別此亦不然實等真體亦無異但可功能相等有別有性亦爾功用有殊云何定執有異實等所以者何俱比知故並非無故用有用故應互相似皆異皆同是故有性非離實等其同異性如有應又云謂勝論者計同異性是現量境既成同異𣸪成此大有有性也又云彼執實等與其有性非即非離前二假是破實句等後二假即此量文之義問此式與隨一不成何別答彼不許成此許其成而成有法義相各別問大乘許其決定成實等否曰不許以如能二字設許之問云何不許答大有性先不許故問然則云何不犯隨一不成所依不成答論主引入此式應就此式其過故若具之宗上犯所別不極成又犯比量相違自語相違因上別犯隨一所依二不成又犯猶豫不成又犯共不定喻上犯能立不成問因云有一實則成有性自相何云相違答有性是遍有性成遍有方成自相因上有字是別有性別有則成不遍有己簡餘法在別有外故不遍則違自相而因能成之故成自相相違因問此式闕因中何相答能別上不闕三相所依上全翻三相和合判之闕初相之不遍宗依問此式從何過分出答此與後條從所依不成分出皆是因于有法上轉犯過失也簡別集解云既實等性豈不大有性耶此彼俱決定故申違量云有性有法即實等宗有一實等故因如石女兒喻依彼意宗上實等即因上一實等謂同同是實等故違量以即實等破之如石女之有名無實也然于彼計別有一實等針鋒不對但是破大有非有不合此式法門量文秪成相違決定非論主意也又引寱言云勝宗十句論云同以合貰德業為義非離有詮智因異以常于實等則轉依一實為性非即有覺義此中引同異為喻有深意焉如同欲合而異反此中成二字即彼合字也文中言喻之同異性不言因句則字非即成字成乃成立義與合義不同強為引證又云此同異喻未陳違義前可作同品定有出違義後翻作異品遍無此是破喻之不必在此式中其且未審同品異品依宗而此是因對有法生過無同異品法大有與同異性非同品本是異品四句六句異故紹解云宗法有法元一體故成則俱成破則俱破今以有成非義同水火宗依宗法元應一體隨順但有法攝多宗則隨自樂為成立若言俱成俱破則所依隨一等不必立矣此二條有法相違因亦不必立矣以有成非縱得是但是違宗非違𪠥法何以故有法言有宗上言非不同一體故又引論本云唯彼𪠥性彼所攝故一向離故諸有皆共無簡別因此唯于彼俱不相違是疑因性若于其中俱分是有亦是定因簡別餘故是名差別論本此假乃是共不共之疑因故上文云以若不共所成立法所有差別遍攝一切皆是疑因不應引之以證此式論本有云取證法有法自性成差別此成相違因謂相違因者一自性相違二差別相違此二成相違因方是此四相違因義直疏云一實等因既非實等宗則有法中亦有非實等義豈不亦文云成實等反云既非實文云𪠥一實故反云有非實等義豈非鹵莾又云俱決定故者謂宗及有法與因相違俱決定故因違宗是法自相相違因與此無干此中因卻不違宗解者却忘了如能成三字集釋云一實等因如能成立非實等宗亦能成立離實等之有性離實等之有性即一實等如能成者何名違自相于自相義尚不能知云何立解又云如楞嚴經立真覺是有法非即非離為宗因云體非七大而不拒彼七大發揮同喻如虗空契經是聖教量不必合因明法軌不可作量文𮗚也若律以因明法門若對外人犯不極成過宗上犯猶豫不成是疑因性七大彼所不許犯不成過虗空是無有法犯不成過諸尚不悉知因明正理偏好立量不可解也直解云有一實等者既決定非實等則實等有者亦決定非大有性俱決定故言一實等亦非大有所有此比例不核實義量文所忌何以故有性與實等彼分句故彼已簡非一例故所立量文亦同此過又以大有是共許法所爭在有實等非有實等又似實等是共許法所爭在有性攝不攝與論主意不合人能解云一字是大有不離實等則大有性不能離實句而自立矣護法云彼執實等與有性非即非離此條與前條但知彼計非離了非即一邉故所破法皆不出彼簡別中若論主此式則非即非離皆破乃設許其二非而其相違也又云此有別自性是有法自相因望有法同品相違名自相相違彼以遍有一切為自性有一實等是宗顯有言遍中不第此三也相違不相違與同異品義相各別不得引同品以解不相違若如此條所解則是非遣有性但遣別有性耳但犯所依不成過非此式之過又彼因上有字與有性有字不違非是因與有法違但是因亦可成有性不遍為相違耳故不應以別有性解自相也又其立量云實等是有法非有別大有性宗竟似成立實等非大有攝與此式略無涉及其出因云有一實故竟以實等句與大有句共諍一實等不成能破安可悟他又別標云有法者有體之法也彼大有性本來無體故出因時自然相違有體法出因亦有相違無體法出因善巧者可不相違然此是有法上因有成相違之義非是泛相違古疏云同異能有于一實同異非有性有性能有于一實同異非有性文意云同異別有一實等爾許同異非大有大有亦別有一實等可有性亦非大有此亦以同異作比例以破有性不核實義所立量文亦犯相違決定過此破法是破所立不成據喻破大有不可以證此式因過如上諸解皆因不顧式法但撗一破彼之主意破得敵例便是妙論不知此論重在明式不重在破外道也所云不顧式法者謂此相違四條句末皆有因字與他過異于此忽略來俱不合此式若能解此此條應云能成有法自相相違之因依此作解則此式之腠理合矣前二後一俱作是解總明因上翻能成立我相違義也解者只知將因望宗望有法上陳相違不到能成相違處豈非忽略句末因字致有錯誤第四式有法差別相違因者如即此因即於前宗有法差別作有緣性亦能成立與此相違作非有緣性如實等俱決㝎故勝論後人被前條破後作轉計云我所云有性者謂遍攝有緣性也非如實等三非有緣性所以一實等之異于實等者在此因上不違有緣性無自相相違過此條對此計而者也於依也作為也緣性者緣生性也彼計實等句中無動作及有動作非所作及有所作有性所攝一實等句中之差別也有動作有所作待緣而起無動作非所作則緣不生成則俱成成有緣性之法無過又成非有緣性之法則為相違法之因矣彼雖巧豈知又犯此過所謂有法差別相違因者不必別引他論如即前條此有一實等故之因即于前非實等之宗而于有性有法上與前計起差別義作有緣性解彼意謂可免前過豈知又別犯有法差別相違之過何以故此因如能成立有法作有緣性有法差別中亦能成立與此緣性相違者作非有緣性例如前實等俱決㝎故問云何如是轉計答文中如即此因作有緣性足顯其救過之計故不別立量文文末如實等語語皆依前問此條與俱品一分轉有何別異答俱品一分轉是因望宗上此則因望有法有法不必分同異品也注解此四條常引同異品者皆非也問此條因何相答宗上三相不闕依宗依亦非遍是宗法性簡別集解云有性一也勝論計有實體大乘明非有實體有與非有有法差別也以成大有性離一切法有自性故即于有作緣也以有性故即于非有作緣也俱決定者實等非實等實等非有性以例有性非有性有性亦非有此解且置是非不論即如所言有與非有乃自相相違豈名差別有性應非有豈非全有法邪此分明易知者尚昧餘義不足辨也又引寱言云緣即因有即同品非有即異品于義無華但變文而言恐滋疑惑故順文而釋使人易曉訓因義牽同異品皆是莭外生枝若變文言只要添一緣字在首有字下已足有何滋惑直疏云實等有性謂之有緣非實等是非有緣即如此解有性是有法非實是宗宗與宗依相違乃以宗之比量相違過與此式無涉集釋云勝論自許離實等有實體大乘意許離實等無實體是有法差別若以立敵各異許為有法差別則聲與非聲差別瓶等與非瓶等差別我與無我差別而虗空之對無空論亦是有法相違不謂之所依不成矣大凡立敵共諍㝎是為有自許若非各許不必起諍不諍則不須立量如是則凡共比量與宗盡是差別相違又凡諍論只諍宗不諍有法諍有法只成相違決定無益也古疏云同異有一實如作大有有緣性大有上一實應作非大有有緣性此條是因過牽喻之同異而已非解又云大有有一實大有是有性同異有一實同異非有性一有性一非有性此有法之差別也解作大有與同異相共之有性若大有外之同異非有性與宗因皆無涉彼勝論亦無計及同異相共有有性探測古疏之意竟以有性為𪠥自體性立義故罝大有與同異對較則不但不知論主列此條之意即勝論所計尚未悉知此後人之冒為古疏者也又立量云同異性是𪠥法非實德業應是大有性宗因云有實德業故喻如大有性又立量云大有性是有法非實德業應是同異性宗因云有實德業故喻如同異性此二量竟是成立同異性非實等又似成立同異性是有自性與勝論及大乘俱無干涉與此式迥然殊徑彼因有一字所以顯不即是實句今刪去之成何因句又不將有緣性非有緣性對較成何疏解彼又云文中有緣性有之一字實德業緣性者能生之因性即是大有若依彼則有緣性三字當作實德業大有因性欲銷此條文萬難消得內𢖍解云前謂大有非實等以顯有性今謂有實等者既決是有性則同異應成有性有性反成非有性矣是名差別相違已為古疏所誤故作此解若云有性反成非有性是違自相非是差別蕅益解云前宗有法差別者前條雖但明大有是有意許則計實等皆有緣性即因也即于前宗其有法差別上前因并可作有實等之因然亦便能成立與此相違而作非有實等之因解緣性為因句之因諸論無緣作因解唯因緣之緣則有之此對內弟子不對外人道也大有有實等有若以此為差別向因上有一二字上轉並不相違若作有實等因作非實等因解此為相違則是宗中有相違義與有法亦無又云是中外量云實德業是有法離大有性外決定別有宗因云有一實等故喻如同異性大乘申違量云彼所執實等有性法離大有性決定非有宗因云有一實等故喻如大有性論文所列正是外量別造此量不但勝論所無其弟子亦決不作此違自語之量也何以故彼計大有有別一實等以有此實等實等非離大有性也申違量只破斥己立之量與敵量不對設或縱許有義亦是相違決定人能解云大有有性大有非有性是差別是自相相違非差別此語例前語則有別自性無別自性亦是差別亦違自相如是則前條與此條俱是差別相違因又云因望有法翻異作同名有法差別相違如果翻異作同是違自相與前式犯重矣又云從因緣生名有不從因緣生名非有無為真如不從緣生非有為法豈可言非有耶又立量云大有非有法非實等宗按首句五字前陳後陳已備何勞再接次句宗上又加次句宗成何量法其量之非理即此可推又云𪠥一實亦成非有有離實亦成非有故犯有法差別相違過如其言乃有翻非有總是違自相非差別相有違差別相違之義相謂其中有不違者其中差別義則有相違者因句能成得不違者又成得差別相違則此因非能成因祗成差別相違之因而已蓋今此式則在有法上講有法中有不違有差別義則相違如此分別方是此式奈諸之急于破大有而緩于明此式安能淂論主本意耶一切言論有公共道理有但取一種以立其論所取仍與公共合言句又與公共文理順即成偉論因明論主于此但取此條一式以立論道理文理俱與公共符合疏解之人若但據公共道理而不顧其所取一式之義相雖道義不謬何名此式之疏解乎况乎文理之未能辨別也紹解云大有唯一應無差別然通該有性中如地水火風有堅濕暖動之性色香味觸有青黃冷暖等性還對此等明差別相也有緣性者有即同品緣性即因意謂以前自相同品之因為今別相同品因也紹後人亦不遵其非確解可知玩其文義亦不能逹己之見糢糊影響而已
