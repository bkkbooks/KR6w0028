body:
  text: 因明入正理論後記序因明者西域五明論之一也西域五明有二外五明者凡俗所智內五明者我佛所造外五明者一曰聲明釋詁訓字詮自流別若此土爾雅切韻字彚類書之類二曰工巧明伎術機𮤚陰陽厯數若此土百工技藝厯法算書之類三曰醫方明禁咒間邪藥石針艾𠰥此土祝由醫書之類四曰因明考完邪研核真偽𠰥此土究明道理諸書之類五曰符印明書契形象印璽雕刻𠰥此土篆隸真草諸字筆法西域記云開蒙誘進先遵十二章七歲之後漸授五明六論也內五明者世尊成正覺已憐愍衆生但習俗書未知至教故借此五明之流別精嚴其科條闡析其理將符邱明攝入聲明特加內明一論究暢五乘明辨因果于數亦合五明小乘阿含略涉其流大乘菩探閫奧故大般若經云五地菩覺五明華嚴經五地品學習聲明工巧等地持論云菩求法當于何求當于一切五明處求陳譯攝論云若菩依本智作利益事謂正三乘三藏及五明等義當無偏倒相違不實不㝎名偏符理真實不可動為無偏處時相濫名倒隨處隨時隨相名無例是名菩利他故瑜伽師地論云菩求內明時為正修行法隨法行為廣開示悟于他故菩求醫方明時為息他病得饒益故菩求因明時為欲了知外道所造惡因諸論為降伏彼故開悟淨信衆生故菩求聲明時為欲令諸衆生悟入詁訓言音文句差別唯以一義殊音隨故菩求工巧明時為以巧智利益衆生故是故求此五明令無上正等菩提大智資糧速得圎滿令此因明一論屬在五明第三廣陳方隅發明因法又因明之理所攝甚廣因緣因果俱是因詮通于內明印于聖教今此一論但是立量之因未顯詮真之奧是故建立此論其義有二一者指迷二者示信地論云若諸菩求因明時為欲如實了知外道所造因論是惡言為欲降伏他諸異論此指述義也又云為欲于此真實聖教未淨信者令其淨信已淨信者倍令增廣此示信義也地持論云求因明者欲知彼論過故欲降伏異類故未信佛法者令生信已生信者令增廣故其義同也指迷示信邪正分明諸經論凡有表言辭雖不明言宗因等法按其文句暗相符合聖天菩所云又扇因明廣大風誰敢如蛾投猛𦦨是也經文亦有特表因明者若華嚴云世間諸因量求過不可得因量者即此因明所立之量也過即論中宗因喻三支之三十三過也楞伽云不因故而有無二俱不成不因即此論以因不成者即是不極成密嚴經云彼之五種過譬喻不成立諸義皆相違五種悉成過惑亂于智眼顛例不顛例同異法斯壞舍離于自宗依止他宗法即此論之條例也慈恩大云因明論者元唯佛又廣義散備在諸經劫初足目菩創標真以二門彌勒菩廣成立八種世親菩再陳軌式綱紀已列幽致未分賓主對揚猶疑未備有陳那菩者是稱命世賢劫千佛之一佛也匿迹巖藪棲巒等持觀述作之利害文義之繁約于時巖谷振吼雲霞變彩山神捧菩足高數百尺唱言佛因明玄妙難究如來滅後大義淪絶今幸福智悠邈𭰹達聖旨因明論道願請重宏菩乃放神光照燭機感時彼南印土按逹羅國王見放光明疑入金剛喻定請證無學果菩曰入定觀察將釋深經心期大覺非願小果王言無學果者諸聖攸仰請尊速證菩撫之欲遂王請妙吉祥菩因彈指警曰何捨大心方興小志為廣利益者當轉慈氏所瑜伽匡正頺綱可製因明重成規矩陳那敬受指誨奉以周旋于是覃思研精乃作因明正理門論正理者諸法本真之體義門者𫞐𢖍照解之所由會玄記云唐三藏為基講陳那之論基大善三支縱橫立破述義命章世無與比今撿三藏無陳那論僅此論及龍樹菩因明正理門論二譯本自唐至今論藏目録具在何獨不列陳那之論亦非後來遺佚而此論又奘所譯頗疑基所習即是此本又百法鈔所引宗因諸過較于此本則合若龍樹論文無能別不成隨一不成等句此又非彼本而是此本之一證號商羯羅菩者或是陳那所授之弟子而依其論本以敷文者也此論疏不傳學者甚少明季至今諸始講自素庵幻齋幻居蘊璞諸念西居士以及蕅益內衡人能諸能談者多人刻本講解者多種樹虛統核諸觀察諸論從源涉流臆見微有差別筆注其如蘿附木乃彚鈔成文名曰後記謂後諸而記其也不敢自信義成決定唯願質之宏法智人乾隆十六年辛未仲冬信三寶人吳樹虗首由緒竟
