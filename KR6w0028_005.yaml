body:
  text: 三似喻分二初總次分今初已似因當似喻似同法喻有其五種一能立法不成二所立法不成三俱不成四無合五倒合似異法喻亦有五種一所立不遣二能立不遣三俱不遣四不離五倒離不成者所引同喻不能成就能立之因所立之宗也遣指宗因遣去之義不遣者所引異喻不為空因所遣則不能反顯其正義也前已次似能成因十三相竟今當復似喻之相共有十種具似同法之喻有其五種一于能立因法喻不扶成二于所立宗法喻不扶成三于因宗二法俱不扶成四但引喻法而缺同喻之合詞成義不顯是謂無合五同喻合辭應先因而次宗今乃先宗而後因是謂倒合此同喻五過也其似異法之喻亦有五種一望所立宗義不為所遣二望能立因義不為所遣三望宗因二法正義喻俱不為所遣四但引喻法而缺異喻之離詞遣義不顯是謂不離五異喻離詞應先宗而後因今乃先因而後宗是謂倒離此異喻五過也顯揚論云𠰥并譬喻乃至由此相于所成立義不決㝎故名不成就相按此同異喻前三種過皆論不成就相所攝瑜伽師地論又云謂立論未有九種過乃至三不辨了四無限量五非義相應不辨了者謂𠰥法𠰥義衆及對論所不領悟無限量者謂所義言詞重復或復減少論又云非義相應者有十種乃至第七義無次序按論雖不專喻而言此中無合不離二過即論不辨了無限量所攝此中倒合倒離二過即論義無次序所攝次分説二初似同喻五種次似異喻五種似同喻復分二初五式次結今初式能立法不成者如聲常無質礙故諸無質礙見彼是常猶如極微然彼極微所成立法常性是有能成立法無質礙無以諸極微質礙性故高原直疏云因是能成立法喻于因上不轉故曰不成所謂能立法不成者如有言聲是有法常為宗因云無質礙故合云諸無質礙者決㝎見彼是常住法故其同喻猶如極微然今按之彼之極微對所成立宗法其常住性或相成而許有其同對能成立因法無質礙性不相合而絶無其義蓋以諸極微體是有質礙性故如何于能立法得相成耶成唯識寶生論云為其能立不共成故指喻對因宗及于喻欲曉悟他于境領受全無力用龍樹論本云如是二法或有隨一不成不遣或有二俱不成不遣吳子西林注云如是能立所立二法其相似之喻或有隨彼一法不成或有隨彼一法不遣共四過失或有二法俱不成或有二法俱不遣總計六過論本又云如立聲常無觸對故同法喻言諸無觸對見彼皆常如業如極微如瓶等異法喻言謂諸無常見有觸對如極微如業如虛空等西林注云同法之喻言業無觸對而違宗即此論同喻所立不成一條極微可常而遣因即此處能立不成一條所謂隨一不成也瓶等與宗因相違所謂二俱不成也即此論二俱不成一條此量云異法喻言極微有觸對而非無常即此異喻所立不遣一條業無常而非觸對即此能立不遣一條所謂隨一不遣也虛空非無常非觸對所謂二俱不遣也即此二俱不遣一條簡別廣承師解云由因能成立其宗名能立法同法喻因其𭘧過即不能成立其宗故名能立法不成按此處是顯喻過非顯因過能立法不成者以喻望因全不成就能立之因法也第二式所立法不成者謂如覺然一切覺能成立法無質礙有所成立法常住性無以一切覺皆無常故高原師云宗是所成立法喻于宗上不轉故曰不成一切覺者即有分別生滅心也一雨師引勝宗論云覺云何謂悟一切境蕅益直解云此亦以聲常為宗無質礙故為因而喻如覺次云所立法不成者即前聲常為宗無質礙因同上合詞而同喻中謂如覺然今按之一切覺法對能成立因法所云無質礙性其義則有對所成立宗法所云空常住性其義則無蓋以一切生滅覺心皆念念無常故北論云問何故次引喻耶答為欲顯現能成道理之所依止現見法故乃至此中相違者為成所立宗義不能為量故不名量按與此條所立不成大意相似第三式俱不成者復有二種有及非有𠰥言如瓶有俱不成若如空對非有論無俱不成蕅益云喻非有不足以成宗因𠰥聲常無質礙因此對有空論則可設對非有空論則空無矣何得論常無常礙無礙哉故亦俱不成也智銓師述義云非有論即無空論彼不許有虛空將何為能立法及所立法之喻乎故亦是俱不成意謂以空作同喻如以龜毛兔角作同喻等本無此物何從合宗因喻乎按銓師所解最為顯了所云喻于宗因俱不能成者復有二種之式謂敵共許此喻是有法及敵但許此喻是非有法是也今先以許是有法者而論之即前聲常無質礙因而所引喻𠰥言如瓶瓶無常而有質宗因俱違雖同是有而俱不能成此是一種更就其非許有法者而論之𠰥所引喻如虛空對彼立無空之非有論師彼不許空為有法矣此何可以引為有法之同喻耶故無論宗因違與不違以彼斥無故亦俱不能成此又一種也簡別高原師云有及非有者分開同品異品兩章以有名同品非有名異品又云如瓶者引喻合前同品宗因乃至瓶體無常會前同品常宗不成瓶有質礙會前無質礙因不成有即同品故言有俱不成𠰥説如空對非有論者引喻合異品宗因以前同品常宗異品應無常宗同品因是無質礙異品因為有質礙説如空者空性是常不成異品無常之宗空性無礙不成異品有礙之因非有即無無即異品故云無俱不成廣承師因不録按論本云如立無常瓶等無常是名同品推論主意當以宗因為主於喻之類者立為同品反者立為異品𠰥如原師等解乃以喻為主反對宗因而論同異似非論主本意況以喻對宗因而論同異則前能立所立過中亦似均有二種之過且同品異品如此設論應須分立四種方得成立一以有法為主望常宗之有法為同品二以有法為主望無常宗之非有法為異品三以非有法為主望無常宗之非有法為同品四以非有法為主望常宗之有法為異品然無非論主意真界師集解云有即用前宗因如身常無質礙故非有即反前宗因如説聲是無因常有質礙故斯則以常宗為有以無常宗為非有也按真師但不指出同品異品而所解亦同然依此消父當云常及無常何等顯豁而必云有及非有耶且在先已立非有為無常則在後對非有論一句似屬贅語而必加以對非有論者應對不許有空之論師説也廣伸師簡曰有以非有為異品有為同品雖似是而實非以異喻在下今但名同何得犯下況文中止言有與非有又云對非有論初無同品異品之言何乃強為之説耶第四式無合者謂于是處無有配合但于瓶等雙現能立所立二法如言于瓶見所作性及無常性高原師云立量之法雖有三支必具合離二詞以為同異之式合必先因後宗離則先宗後因以因為能成立法故先之宗是所成立法故次之喻為宗因之明訓故又次之一雨師云三支病痛一合便見此無合所以成過真界師云是處即同喻處也廣承師云但于瓶上見此宗因不著言也如云聲無常所作性故譬如瓶等不言諸有所作見彼無常故云無合按承解所作無常二性但于瓶上雙見全無其語似為無合詞之正式或問既言于瓶見所作性及無常性即是合詞何必定須加以合云方許有合耶所謂無合者疑其但言于瓶而不云同喻如瓶則所引喻不分同異不顯合同之義是則為過此附録以俟後定下不離一條同此所云無合者謂于是喻處無有同喻等字以配合之但于瓶車舍等喻上雙現能立所立之二法其無合之式𠰥何如言于瓶之上自然見所作性及無常性而不加以合云諸有所作皆是無常同喻如瓶等是則辭有減少敵不領悟有違因明之成式矣龍樹論本云謂于是處所立能立及不同品雖有合離而顛倒或於是處不作合離唯現所立能立俱有異品俱無西林注云一者謂於是喻處所立宗能立因之同品及不同品之異品不能遍攝遍遣二者雖有合離二詞而顛倒説三者或于是詞處不作合離順及唯現所立能立之俱有及異品之俱無是非樂合離也按西林解是處的指喻處而言故今循之至同異品不能遍攝遍遣一義即此論前三條攝其論本不作合離一義即是此處無合及異喻不離也其論本顛倒説一義即是同喻倒合及異喻倒離也問喻中無合云犯過何以大乘論師所列同喻多無合詞答西林真唯識量解云量中𠰥有法若宗𠰥因云合云等此等彼部所共知故此等于法式則標臨文所無故𮗚大乘諸論師盡無此等云云當知不合不離倒合倒離四過皆措詞未協之小疵然于因明方隅有違故列之為彼部所知則臨文而略合詞亦不致受敵語難也集論云一立宗二立因三立喻四合五結六現量七比量八聖教量乃至立喻者謂以所見邊與未所見邊和合正説合者為引所餘此種類文令就此法正説理趣按此論合之語則合詞中諸所作者之諸字甚要簡別麥浪懷師正義云蓋聲以無質礙為能立因以常為所立宗一無所合故曰無合按無合倒合二條不應根第一條宗因説𠰥懷師解是俱不成過且諸無質礙中亦有所作性在內如屈伸等業是無質礙而是所作屬同品一分轉非令無合也第五式倒合者謂應説言諸所作者皆是無常而倒説言諸無常者皆是所作廣承師云立量者舉同法喻時配合之詞要先因後宗名為順合𠰥先宗後因名為倒合所云倒合者謂同喻合詞必先合因而次合宗故前宗因喻支合應説言諸所作者皆是無常方謂之順而今乃倒説言諸無常者皆是所作故成過也龍樹論本頌曰説因宗所隨宗無因不有乃至料簡云復以何緣第一因宗所隨逐第二宗無因不有不因無宗不有耶由如是能顯示因同品定有異品遍無非顛倒西林注中難云説法次第先後先重後輕因本成宗而第一句因在先第二句方宗無在先𠰥依第一句先後説何不因無宗不有耶答説法以顯義為要以依主措詞豈執先後拘法此處是因相為主應先説因以顯宗法同品為要第二句顯異品之翻宗故應先説宗由如是抑揚其詞能顯示因之同品定有𠰥與宗異品者則遍無其義亦重先輕後之義非顛倒説簡別蕅益師云亦有無常而非所作者故亦有過按所解甚是而不確定此條倒合過次結如是五種名似同法喻品次似異喻五種今初式似異法中所立不遣者且如有言諸無常者見彼質礙譬如極微由于極微所成立法常性不遣彼立極微是常性故能成立法無質礙無廣承師云遣即離也夫立異喻意在反顯𠰥不遣者意濫于同蕅益師云于因成異喻于宗不成異喻名為所立不遣次似異喻法中第一所立不遣者且如前立聲常無質宗因而異喻有言諸無常者見彼質礙譬如極微則此喻犯過由于極微於所成立宗法其常住性不能遣除以彼許立極微是常性故致成所立不遣之過𠰥能成立因法其無質礙之性極微無其義故非能立之不遣也簡別真界師云且如下對前同法常無質礙宗因應立量云聲是無常質礙性故異中離云諸無常者見彼質簡別蕅益師云亦有無常而非所作者故亦有過按所解甚是而不確定此條倒合過次結如是五種名似同法喻品次似異喻五種今初式似異法中所立不遣者且如有言諸無常者見彼質礙譬如極微由于極微所成立法常性不遣彼立極微是常性故能成立法無質礙無廣承師云遣即離也夫立異喻意在反顯𠰥不遣者意濫于同蕅益師云于因成異喻于宗不成異喻名為所立不遣次似異喻法中第一所立不遣者且如前立聲常無質宗因而異喻有言諸無常者見彼質礙譬如極微則此喻犯過由于極微於所成立宗法其常住性不能遣除以彼許立極微是常性故致成所立不遣之過𠰥能成立因法其無質礙之性極微無其義故非能立之不遣也簡別真界師云且如下對前同法常無質礙宗因應立量云聲是無常質礙性故異中離云諸無常者見彼質礙譬如極微此但遣因不遣宗也按聲是無常質礙性故量詞與此條所立不遣本旨針鋒似不相對且能立能破中均有同品異品細研對前同法等詞亦似單貼能破邊説了因按立量以聲常無質礙為宗因故以無常有礙為異喻而極微但遣無質礙不遣常故為所立不遣也𠰥言聲是無常質礙性則宗因俱反矣豈但不相對己哉又惟宗因俱不變更故喻有同有異有不成及不遣之過𠰥宗因亦變更則紊亂而不可為式矣據理當云聲是常無質礙性故與同喻初式宗因相同為正與下句異中離云句及遣因不遣宗句皆合矣然味彼對前同法及應立量之云則似對同而為異立量與前宗因為反對矣已反對下文異中離云數句及遣因不遣宗又説不去且以聲為質礙性犯世間相違過故知必無常二字誤倒也第二式能立不遣者謂如業但遣所立不遣能立彼諸業無質礙故一雨師引勝論云業句義云何謂五種業名業句義何者為五一取業二捨業三屈業四伸業五行業蕅益師云于宗成異喻于因不成異喻名為能立不遣所云能立不遣者即前宗因而異喻謂如業則此喻亦犯過蓋以業性共許無常但遣所立常住性宗不遣能立無質礙因以彼許諸業無質礙故致成能立不遣過也第三式俱不遣者對彼有論如虛空由彼虛空不遣常性無質礙性以虛空是常性故無質礙故高原師云俱不遣者謂異品喻與同品中宗因相順名俱不遣所云二俱不遣者即前宗因而對彼許有虛空論師立異喻謂如虛空則此喻亦犯過由於引彼虛空以為異喻則不能遣常住性宗亦不能遣無質礙因何以故以彼許虛空是常性故無質礙故致成二俱不遣過也問前俱不成中分列有及非有二種何以俱不遣中但對有辨答論本云喻有二種同法異法乃至異法者謂諸有常住非勤勇無間所發如虛空等前是詮後是止濫由合及離比度義故由是雖對不立實有太虛空等而得顯示無有宗處無因義故西林注云前同法喻是敵論之詮而表自立之正後異法喻是止異之濫而顯自義之純由前之合及後之離抑揚比度義愈顯故問此注中自作問答𠰥對不立虛空論云何許説答止辭離我所立異法非宗所收是我許何礙他遮對立空論同異許𠰥對不立空論順我合同離異由是之故雖對不立實有太虛空等而得顯示此異品法為無有宗處之義者亦無有因處之義所謂宗無因不有義極成也蓋彼以不立虛空為同以立虛空為異今我亦以為異以離詞遣之故許我為異法也按論本所對非有論許其無過故與同品有殊或問細研對彼有論四字明簡對彼非有論師毋論同品異品似均不許引空為喻何以龍樹大師復開非有對論無過耶答論本亦云若無常宗全無異品以對不立虛空論云何得説然對非有而論虛空俗諦所許有可開義故龍樹師復以雖對不立字樣而成立之又論本云若有于此一分已成隨一分但有同喻亦能成立若如其聲宗如因言兩義同許俱不須説二喻俱省是則有同無異抑或同異俱無如能成立尚許其開何況世諦共許之空常耶所以師心而不師古者非也泥解而不融解者亦非也簡別高原師云對彼有論有即同品真界師云彼有即指同中常無質礙也按真師同字似指同品言然此中有論當指許有空論師説蕅益曰謂𠰥無虛空論立聲常者或説異喻如虛空以對有虛空論則彼虛空二字不能遣常住宗亦不能遣無質礙因按無空論立聲常句似此條專貼無空論師所立以與有論對辨恐非的解況無空論不許有豈肯自教相違復立空為喻乎𠰥作對無空論而解少一對字文義便晦且彼不許有虛空本無其物何得論其常與無常無悟他果如依俗諦所許為論則仍犯二俱不遣過所有或二字似亦不能成立第四式不離者謂説如瓶見無常性有質礙性高原師云立量之法合成同品必有離詞顯異品式今者但有異品三支之名缺于離詞不合軌式所云不離者即前宗因而但出喻謂説如瓶意以瓶上自然見無常性及有質礙性竟不加以離云諸無常者見彼質礙異喻如瓶等是則辭亦減少敵不領悟有違因明之成式也第五式倒離者謂如言諸質礙者皆是無常蕅益師云合必先因而後宗離必先宗而後因語脈應爾決不可亂亂則非真能立也真界師云此似喻中同異十過前三皆就宗因明過後二但明合離之過前三就宗因明過者以宗因皆齊但引喻不齊遂使同品不定有異品不定無故也後二雖明合離之過然三支圓滿合離始陳是以合離之過亦歸喻也所云倒離者謂異喻離詞必先離宗而次離因如前宗因而出異喻理應言諸無常者見彼質礙方不顛倒而今乃倒言諸質礙者皆是無常故有過也四總結似能立三支如是等似宗因喻言非正能立前如是等似宗因喻多言共有三十三過均非正能立也
