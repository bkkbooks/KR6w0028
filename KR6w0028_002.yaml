body:
  text: 次似能立門分四初似宗次似因三以喻末結以宗分三初總標次分示末結今初雖樂成立由興現量等相違故名以立宗謂現量相違比量相違自教相違世間相違自語相違能別不極成所別不極成俱不極成相符極成以與真翻名是實非相違者違于量法量果也不極成者不成就量法量果也餘解見後所謂以能立者謂人雖是喜樂成立宗義由宗上義相與現量等相違背故則不淂為真能立但名假似立宗而已云何是現量等云云謂現量相違乃至相符極成此九種皆以宗過失也問樂成立云何成以答有三因緣一者有邪智而不能成就作具二者無作智而不成作具三者略有作智而未善作具其為無悟他之果則同也問既具邪智云何不能成就作具答作具必依智而有所依已非擅巧妙安能合理如行邪徑不能坦蕩問云何是九過次第義答前重于後末輕于前現量最重比量依之而有比較于自教比于世間比于自語比于敵論比不成比量無可量皆比量義現量已違何必比量比量尚違何况其餘于比義雖能略合自背其教人誰信之雖順自教非世間共許一人私衆所不名曰如天授語天愛非餘自語反覆豈能示信此五相違較後為重三不極成或有立義本但為敵所不許其過則輕相符一過不為損己但非悟他無益之談徒為助敵又對敵申量鮮有犯者故列于末分示九過今初相此中現量相違者如聲非所聞此以能立中初現量相違者如聲明論量云聲有法非所聞宗夫現量者現識緣現境而了別今所聞既遣則無現境安知是聲故曰相違問聲明論何故立此論答彼意欲立聲常𠰥言所聞聞則非常彼計詮表之聲意識所緣聞有間意根無間如二人能言同是所聞慧人會意愚人不會見詮表之聲全意覺非聞功能豈知能聞所聞人人現證即此現量相違一因足破其宗廣百論釋云聲𠰥能詮便失聲性非所聞故按此破法是現量相違外別作破斥義謂設許非所聞性則聲性離聞云何能詮表諸義現見立詮表者欲人聞故彼破聲性此破非所聞故微有異此現量是共現量非不共清淨現量如六根互用亦可聲非所聞此則不共世間之清淨現量也問聲非所聞亦世間相違豈止現量答二過相較現量為重舉重棄輕故如此次第二過相比量相違者如瓶等是常所言比量相違者如有外論云瓶甌等有法是常宗比量者比度而知瓶甌等現前雖成一合相必歸散壞衆所比度證知故問瓶等無常人所易知何人立此宗論答餘乘部中計極微常瓶等衆微所成故為常然分析至無分析方名極微令不分處而合處既可分合即是無常豈不違于比度正理𠰥依不共清淨正量瓶等不可常不可非常常與非常皆成戲論故此比量亦非至教離言之旨次第三過相自教相違者如勝論立聲為常彼自謂其論最勝名為勝論所言自教相違者謂如外道勝論論立宗云聲有法為常住彼教六句中之德句攝聲在無常中今聲常則違自教大域言吠世史迦多羅此云勝論即外道六中之衛世也成劫之末彼出世名嗢露迦此云鵂鶹晝避聲色匿跡山藪夜絶視𦗟方行乞食時人以為似鵂鶹鳥故名鵂鶹仙人百法論名為優樓佉或名羯拿僕此云米齊食先為夜遊驚他稚婦乃不夜乞遂收場碾糠秕之中米齊而食故時號為米齊仙人多年修道遂獲五通謂證菩提便欣入滅但嗟所悟未有傳人愍世有情癡無慧目乃𮗚七德授法令傳一生中國二父母俱是婆羅門種三有般涅槃性之身相具足五聰明辨捷六性行柔和七有大悲心經無量時無具七德𣸪經多劫婆羅痆斯國有婆羅門名摩納縛迦此云儒童有子名般遮尸棄此云五頂頂髮五旋頭有五角其人七德雖具根熟稍遲既染妻孥卒難化導經無量歲伺其根熟後三千歲因入園遊與其妻妾競華相忿鵂鶹因此乘神通化之五頂不仙人且返又三千歲化又不淂更三千歲兩競尤甚相厭既切仰念空化仙人應時神力化引騰空迎往所住山中與所悟六句義法六句義者一實句二德句三業句四大有句五同異句六和合句實者諸法體實德業所依名之為實德業不依有性等故實句有九種一地二水三火四風五空六時七方八我九意此九種中計空時方我意五種為常住地水火風四種非所造者常所造者無常又計地水火風意五種有動作有質礙有𫝑用有彼此體餘四翻此德者道德德句有二十四種一色二香三味四觸五𢿘六量七別性八合九離十彼性十一此性十二覺十三樂十四苦十五欲十六瞋十七勤勇十八重性堅十九液性暖二十潤性濕二十一行動二十二法生可愛身因名法人天等二十三非法生不可愛身因名非法邪智等二十四聲此二十四種中一色至八合通常無常重液潤三通常無常非所作者常所作者無常餘十三種皆是所作唯屬無常業者作用動作意也業句有五種一取二捨三屈四伸五行大有者彼計離實德業三句之外別有一法為體由此大有乃有實德業故同異者如地望地有其同義望于水等即有異義地之同異是地非水水等同異其義亦然彼亦計為離實德業有別自體和合者謂法和集由和合句如鳥飛空忽至樹枝住而不玄由和合句故令有住等此六句者是我所受具未解以來受用前六𠰥得解與六相離稱為涅槃問此條是勝論弟子所立或是論主設為是言答是彼衆所立凡此論中所諸條悉據曾有而非自所造問彼衆所寧肯自違其教答後人轉計致違自教如小乘有宗𡚶計心境俱有有違自教唯識宗𭥍此論立聲為常是勝論弟子通于聲論之人所立問此條亦比量相違云何但違于自教答亦比量相違欲舉違自一式偈舉此耳問有不違比量而違自教者否答有如勝論弟子地水火風非所造者無常如教弟子對外道常樂我淨彼亦得斥為違自教無常無我護法云如是所執亦違世間自宗所許果先㝎無世間自宗皆不可故自宗即自教不可猶不許次第四過相分二初初相次次相今初世間相違者如懷兔非月有故懷兔者懷妊兔胎也兔望月有妊世間共許所言世間相違者如有云懷妊兔胎由兔自起欲心攬月有妊兔自戀月月不接兔除能取外無外所取故云非由月而有故理雖可而違共許護法云世間有法有三種一現有所知法如色聲等二現受用法如瓶衣等如是二法世共知有不待成立三有作用法如眼耳等由彼彼用證知是有如此三法是入世俗所了受境世間復有三種無法謂究竟無及隨三有前後際無為簡此無故少有按違此有無六法是世間相違問立論𠰥依正理何必世間共許答因明法對敵申量最重共許𠰥非共許無悟他果申量何益共許之共相㝎依世間𠰥不將世間共許作證慿何為凖如此條懷兔之是月有非月有天眼方知天眼非世間共許論中斥之曰天愛非餘謂天界方愛此語非餘世間所許也又或斥云如天授語亦謂非世間所共解也又兔類本有雌雄餘獸又無由月懷妊之比故現量比量皆不可持以較論唯兔望月懷妊世間久遠相傳共許今立此宗㝎以世間相違斥之然則正教弟子對敵而天帝釋等事亦犯世間相違次第四過次相又如言人頂骨淨衆生分故猶如螺貝頂骨髑髏也分肢分也螺貝水中甲蟲佛事吹大法螺共許為淨又有世間相違一式如有言人之頂骨有法本淨宗是衆生身體之肢分故因猶如螺貝之為法樂吹器喻其為潔淨則同也然世間之人以枯骨為不淨嫌惡而之以螺貝殼為淨用為吹螺飲器雖同是衆生身分而淨穢所許不同不淂據理而違世間也顯揚論云修自苦行者或依髑髏按此或是外道所立量也問此條亦違現量骨鎖𮗚中現證不淨故亦違比量衆生支分精血不淨所成故云何判作世間相違答𮗚中現量非敵家所許不淂措辭比量可相違然教中許用螺貝為器而法鼓用皮亦屬身分設我以不淨比彼彼以螺鼓比淨斥我則違自教或犯相違決㝎不淂悟他𠰥以世間共許判過立言方無𦉑漏問前條已示式何故重列此條又此顯宗過何故備陳因喻答此中具有微意前式人所易知此式之因喻以成宗所以備陳頂骨螺貝原是一例而一許不淨一許淨共許中已分差別此不可以理義者唯世間相違判過彼才信服由此推之正教後人令宗因喻三支盡合教理及對敵申量而違世間不得立論問螺貝亦非淨物喻豈無過答雖非淨物不淂稱不淨釋氏亦隨順世間器用故故可設許次第五過相自語相違者如言我母是其石女有女形而無女事僅比石人故名石女所言自語相違者如有言曰生我之母有法是其石女宗石女不能生育今云我是其子則自違石女之語問何人此無義言論直是戲談答大抵外道曾有是彼欲自顯其異謂非欲穢所生非欲門而出此事即或真實然違自語此條亦違現量然天眼等通非世許故亦違比量然頂生王腋生子比或有故又蓮華化生佛菩不不淨生遮之則違自教故亦違世間然石女轉根亦能生育世間亦許故唯自語相違判過無失倘正教弟子未諳此過隨立辭必𭠡敵家之斥問云何是隨立辭招敵破斥答如教中遍計等三自性又三無自性亦違自語然攝入至教量中可無違礙𠰥對敵而言便為犯過因明所明專重此義又如持戒但律身非身何所束亦違自教又如無有少法可取少法唯有自心還取自心即兔非月有義又如于其心淨則國淨即頂骨淨義亦違世間總為對敵不可之犯過不能悟他今論云分別如前諸式皆是委悉開示欲人共許不會此意不可以解因明此五種相違即是破敵之因立辭𮗚待于現比世間共許藉是相違語成破他因𮗚待于彼教彼語隨順其教語而破之淂破他益具待藉順益二義宗上義相違背現比二種攝盡非月有一種示立有立無者當依共許頂淨一種示立淨立穢者當依共許推于立增立减立生立滅立玄立來等皆須世許自教一種示人未盡通教理者不得輕忽立論自語一種示人辨才劣弱者不淂鹵莾立論𢿘式非止外戒內徒此土諸無敵可對于自教人但至教已可何勞立量喜樂立量者恆多犯過次第六過相能別不極成者如佛弟子對數論立聲滅壞宗一名能別者能對他論顯其自有別義𢿘慧𢿘也𢿘度諸法根本立名𢿘起論論能生𢿘故名𢿘論生翻為滅成翻為壞彼計諸法沒時但是轉末歸本不可見未嘗滅壞所言能別不極成者如佛家弟子對𢿘論弟子立量而建立聲有法滅壞宗之論聲滅雖是理但敵家已簡別聲非滅壞夫立敵共許方銘極成今立彼所不許之義安能極成不極成則無悟他之果𢿘論名迦毗羅此云黃赤色髭髮面容俱黃赤故時世號為黃赤仙人修禪㝎有神通知八萬劫中事外道六之一也梵云僧佉此云𢿘𢿘論立神我諦體為受者由我思用五塵諸境自性便變大等二十三諦自性者稱為冥性八萬劫外冥然不知謂為諦亦名勝性未生大等但住自分名為自性𠰥生大等便名勝性用增勝故大等二十三法者謂冥生覺亦名智大謂冥初之際覺知增長從覺生我心亦名我慢我心生五微塵亦名五唯量唯亦㝎義唯定用此成五大故即五塵也五微生五大即空風火水地也五大生十一根先生五知根即眼等五根也次生五作業根謂語具乎大小便處後生心平等根此二十三法皆第二十五諦神我之所受用冥性一大等二十三神我一共二十五諦彼計我思勝境冥性即變二十三為神我受用我既受用為境所纏縛不淂解我𠰥不思冥性不變即得解名為涅槃廣百論釋云𢿘論外道義加言一切法實無生滅但有時分因果轉變所謂聲等或𣸪樂等不捨自體轉成餘相轉成餘相者如聲唯生空大空大成耳根等所謂無生滅者果起不生唯變成故果謝不滅歸本性故又金七十論云大等諸物轉末歸本則不可見是名為沒如五大等轉沒五唯中不𣸪見大等乃至大沒自性中大亦不可見自性不如是無有轉沒故按彼計聲滅歸本性本性無有轉沒則雖滅而本性仍在無有散壞㝎不許立滅壞之論𠰥立滅壞足以佐彼歸本性之如何顯得能別故云能別不極成也佛性論云汝義之聲有自性與自性不異者是義不然何以故若聲有自性則聲應為耳本𠰥聲即是耳耳即是聲可自性即聲聲即自性汝𠰥不許耳即是聲亦不許汝聲即自性若聲是所聞與耳異者己所聞故與自性亦異若云不異何故不聲能聞耳𠰥得爾者則聲滅時耳應俱滅故知聲耳一物不成例餘亦爾當知諸法決無自性又廣百論釋云𠰥謂大等皆用自性為體大等變恃自性應變由此自性應是無常體無異故猶如大等又云如是所執自性最勝一分有用變成大等餘分無能無所轉變是即自體應成種種成種種故㝎是非常如大等果相非常住按此二論是破彼聲自性也自性既破歸本之義無歸而滅壞義成是為能破不可于生滅義攻彼也教中諸論破𢿘論者多條𠰥瑜伽成唯識之破神我皆于此式無預故不廣引問聲歸滅壞比量可知亦世間共許護法云世間共許一切無常滅壞為相又根境品中廣雅聲性散壞龍樹亦以勤勇無間所發因成立聲滅壞云何列在能別不極成中答因明重在悟他須他信受方可了悟前五相違非共許所攝三不極成非他許所攝由是論之量𠰥有過能破我者不必皆是正人論雖帶過所立之義不必㝎是𡚶計此因明示立辭之本義也是以此下三條之式雖不違比量世間奈非他許即非極成次第七過相所別不極成者如數論對佛弟子我是思宗依有法名所別由宗名能別而名也此式我字是所別思字是能別佛弟子許在遍行心所中故非能別不極成佛家五蘊為人㝎無我故不許有我是所別不極成所言所別不極成者如𢿘論對佛家弟子我有法是思宗思即是我其性常住二句出廣百論釋佛家不許有我故非極成廣百論釋破我思云思我體相非現量境以其自相非諸世間共知故非比量境按論意以現比破彼與此式無與此條但示敵家不許宗依之式次第八過相俱不極成者如勝論對佛弟子立我以為和合因緣能立所立俱不許故名俱不極成所言俱不極成者如勝論對佛家弟子而立云我有法以為和合因緣宗彼之能別所別佛家俱不許其極成也勝論六句中實句第五為我德句中之十二覺十三樂十四苦十五欲十六瞋十七勤勇二十一行二十二法二十三非法共九種第六和合句彼計九種和合因緣能起智相我與和合作因緣各令九種與我和合起于智相故立此論廣百論釋云彼雖立我是有是常而竟不能立因立喻非無因喻所立得成𠰥唯立宗則得成者一切所立皆應淂成設𣸪方便矯立因喻即所我其體非常一切有因皆非常故按此是破我之論也有我已破和合因緣已無所依不消再破問百法論心不相應行有二十三和合性四緣中有因緣云何非內教所許答彼計以我為和合因緣內教以緣起為因緣非由有我其義迥異故非我許然廣百論釋恐違自教故不遮和合因緣而破斥有我次第九過相相符極成者如聲是所聞相符相合也違所別能別二別字義極成者極能成就敵家之論所言相符極成者如有云聲有法是所聞宗與敵符同不顯別義立量何益瑜伽云相違有二因緣一者不決定二者同所成按前八過不決定攝此條是同所成同所成而亦名相違者違于量果也義與敵同何消立論問相違不極成是過極成何又犯過答共許自許與極成義別非共自許義便可極成極成與量果又別非是極成者便獲量果蓋宗依宗體中義相甚廣共許中義相亦多即共許之中敵義主甲我義主乙方名能別古德所謂立敵共諍是名宗體也前之八過諍者負墮此條之過不能共諍均非量式廣百論釋云諸有比量能成立他所不許義乃名能立謂共許中有不許與彼宗異者即翻此條之言問經論文中每相符世俗言語豈亦犯過答論有五分𠰥在因分𮗚察分中相符言不為犯過何以故淂𮗚待順益二因義也立量則但有三支無因分𮗚察如何相符淂且經論乃教中人誦持因明中諸過或違自違共或同所成若至教量攝犯而非犯不淂以親對敵家例之問不共許既不可共許又是相符云何對敵立量答摘彼宗依因喻上瑕釁據其許一分者而奪其全分或據違末義者而奪其主義總當分彼之矛攻彼之盾諺云借他拳頭拄他口是也如是則彼辭已屈彼意已塞彼悟其非不煩言而已決至于相符一過只在宗上犯之餘二支所無然既對敵顯宗犯此者少故列于末末結如是多言是遣諸法自相門故不容成故立無果故名似立宗過遣斥玄也自相門者自義相之法門也諸法前文條件前五相違初條遣聲之自相門次條遣瓶無常之自相門三條遣本教之自義相四條遣世許之自義相五條遣自語之自義相不容成者不究極成也第六條不容成能別七條不容成所別八條俱不容成如上八條已相違已不容成量是非量何暇論果第九條似可極成無違雖立而無果也猶言無益如是前九相多言前五是遣諸法自相義門故中三是不容極成故末一是立無果故如是九相名為似立宗之過失佛地論云彼因明論一切法上實義皆名自相各符己體不共他故是此文自相義問九條皆可以此三句之云何將九相分配三句答次句不容成于三不極成親切末條極成于無果親切又末條無遣自相義中三但他所不許亦無違義若可遣宗自相解𮛫迂曲末條亦無不容成義前五但相違不成字立言以是論之分配得論主意多分
