body:
  text: 次似因分二初總記次分記今初已此宗當此因不成不定及與相違是名似因不成者不容極成不定者不決定成前文已以能立宗九相今當次以能成因之相其相有三一不成二不定及與相違因是三者名為似因翻真名此因翻名顛倒因決定名亂因翻隨順名相違因瑜伽云于所生法能障礙因名相違因相違因略有六種一語言相違謂所造論前後相違二道理相違謂為成立諸所成立諸所知義建立比量不與證成道理相應三生起相違四同處相違五怨敵相違六障治相違云云今此相違因言語道理二種所攝次分分三初不成次不定三相違初不成分二初四相次四式今初不成有四一兩俱不成二隨一不成三猶豫不成四所依不成兩俱者有法與宗俱也隨一者謂彼論所許差別今我此因隨彼所不許之一分而立猶豫者不決定所依者即宗依有法所言初不成之相其名有四一者宗與宗依兩者俱不容成二者隨彼論中一分不許者而立因不容極成三者立猶豫因義非決定不容極成四者我因中義以有法為依彼不許我所依則不容成如是四相是以因不成過次四式分四今初式如成立聲為無常等𠰥言是眼所見性故兩俱不成等字等取滅壞所言兩俱不成者如有成立聲有法為無常宗等𠰥言是眼所見性故因有法及宗兩俱不容成也聲是耳所聞性今云眼所見性則是眼所見之無常與耳所聞之無常何預故俱不容彼成立也問云何有人立此無義之論答大抵是破聲明論者所立彼論以詮表聲名身句身列于文墨是眼所行境故彼謂詮表是所見非所聞見性無常彼所許故破彼聲常其論可立豈知一切言語盡是詮表何必定屬文墨將眼對聲易聞為見兩義俱失云何容成四不成中此過最大問此亦現比世間相違云何別不成答宗為所成因重能成依因過表以不成不成二宗可攝違現比等問此因正因何相答不但不遍亦且不攝不是而非全與遍是義差謬初相已失何論同品異品第二不成式所作性故對聲顯論隨一不成聲顯論許所作無常有非所作之有性在所言隨一不成者即如前文立聲有法為無常宗𠰥言所作性故因對聲明論則容成𠰥對聲顯論彼許聲雖有所作性而別有未顯之性非無常則于彼所計中有一分不容其成也故名隨一不成或有不悉因明法門將破聲明之因對聲顯而則犯過也蓋因聲明已被所作性因破彼常宗為此轉計立聲顯論謂聲性不緣生本來有性待緣顯發而成詮表不從緣生則已簡別所作所作無常不礙有性之常此因在彼簡中云何許成此即瑜伽所隨緣顯了之外論也瑜伽云謂一切諸法性本是有從衆緣顯不從緣生謂即因中有果論者及聲相論者聲相論者外聲論起如是見立如是論聲相常住無生無滅然由宣吐方得顯了問如論所言當用何因破彼答前文勤勇無間所發因乃破彼正因問成唯識論以待衆緣故之因破聲顯論破法有別答待衆緣與勤勇所發語異義同勤勇無間即是發聲之緣待彼而發義無差別問龍樹似喻過能立所立二者有一不成名隨一不成與此式同異何別答隨一兩字甚寬凡有一分成一分不成者皆名隨一此隨一不成即差別相違之例彼隨一不成即能立所立或成一不成一之例此因非遍許遍攝與遍是相違因中既已夾雜出喻定與同異品相淆三相俱有陷第三不成式于霧等性起疑惑時為成大種和合火有而有所猶豫不成霧等等取煙靄雺不定曰疑執疑曰惑大種地水火風空也交互曰和相并曰合有所者霧等也于依也所言猶豫不成者謂人依于見霧等體性心起疑惑之時遂為成立大種有法和合火有宗之論而有所云以現霧故因則此因依疑惑而立意未決定故名猶豫不容成也大種之霧等甚多差別若山煙野氛靄霧地大也若水霧雨氣曉雺水大也𠰥薪煙熖影火大也宗上和合火有不違現比共許若現霧因句則與山煙水霧無別云何定指是火和合而有豈非依霧等疑惑之所致哉和合者謂薪炭地空和合而有火四大能造空不礙生皆得名種龍樹云又若猶豫如依煙等起疑惑時成立大種和合火有以現煙故問諸立論者有表有皆為明理立宗此式全無係直是戲論云何立此答論主為無舊式可引聊舉此式以喻諸狐疑不定之因兩可雙兼之皆非敵許如亦有亦無非有非無等言若對敵論皆此猶豫不成所攝以示教中弟子不悉因明方隅將至教量之色即是空空即是色等言而向敵立因必招破斥夫至教言辭豈可示過聊取此無輕重之論示一端當會其意而推廣之也問此條推廣已知前二式可推廣否答有如至教云世尊法四十九年于中不一字對外道亦兩俱不成如極微不生不滅非五識所緣故對量部亦隨一不成現煙之因可攝火有不能遍攝地有水有從猜卜而其非遍是宗法性顯然火有之同品不定有如石炭無𤇆異品不遍無非火亦有煙霧三相俱第四不成式虗空實有德所依故對無空論所依不成德者勝論之德句也無空論者不許虛空之論謂以無故名虛空但是無不能表有所言所依不成者如有云虛空有法乃是實有宗一切有德性所依而住故因若對無空論而所依乃是虗無如何成淂實有故不容成勝論實句中有虛空德句中之色香味觸等二十四種多分依之而生又口力論亦云虛空為萬物因空生風穢生火火生暖暖生水水生凍堅作地地生五榖五穀生命命歿還歸空是故虛空為萬物因是涅槃因小乘亦云地輪依水水輪依火火輪依風風輪依空四大有生滅虛空無生滅故護法云有餘釋子執虛空等實有常住大乘大智度論亦云譬如虛空無所有而一切皆依以成無空論亦外道所立然大乘亦有其大智度論云摩訶衍中虛空名無法不淂常不淂無常不得言有不得言無非有非無亦不可淂起信論云虛空是其𡚶法體無不實以對色故有是可見相令心生滅由前二條𮗚之佛教中有依空有非實有論主恐違自教難于立辭今云對無空論則槩而言之足以示式又不違自教也問虛空實有對無空論已犯所別不極成何待出因始犯答論中諸式非是一式只此一過設此式宗法因喻俱犯其過𠰥列在似宗中則宗過列在以因中則因過列在似喻中則喻過所以如是者取顯示一過之式耳非謂此論無他過也如此條宗犯所別不極成而不極成之式已見別式故但從因示其所依不成耳問龍樹論云或于是處有法不成如成立我其體周遍于一切處生樂等故對無我論所依不成與此同過否答雖同而微異同為不許有法無異也此條宗上實有二字彼不同也問廣百論釋云如是句義所立能立一分所依不極成故與此所依異否答龍樹之能立所立隨一不成是以喻過此論所立能立一分所依不成是乃因過此條宗法上違因依其非遍是宗法性可知宗尚無所依何論同品異品次不㝎分二初不定相次不定式今初不定有六一共二不共三同品一分轉異品遍轉四異品一分轉同品遍轉五俱品一分轉六相違決定因中同異品俱攝名共俱不攝名不共共則違異品遍無不共則違同品遍有一分者或淂其半或多分中僅一分望遍字轉者隨順彼義路而行也異品遍轉異品一分轉俱品一分轉總非異品遍無相違決定雖有同異品而異無所同難助自與無品同安淂決定成宗所言次不定之相其名有六一者共不定二者不共不定三者同品一分轉異品遍轉四者異品一分轉同品遍轉五者同異俱品名一分轉與定有遍無不符成不定因六者相違決㝎各己義兩決定不能㝎于一義故亦不定所攝龍樹云若法是不共共決㝎相違遍一切于彼皆是疑因性疑因者猶豫因也不定之別名問不成不定差別之義答因犯敵全不容成不犯敵自抱其釁欲成而不㝎成是二者差別義故不成四相違于遍是宗性不定六過違同品異品二相決㝎相違與相違決㝎義相為別決㝎相違者不隨順彼決定與彼相違也相違決㝎者此立此論彼立彼論為不降伏其相違也從此決㝎不淂悟他與宗中相符極成相均無量果次不㝎式分六初式此中共者如言聲常所量性故常無常品皆共此因是故不定為如瓶等所量性故聲是無常為如空等所量性故聲是其常所量性者所量度而知之法性也瓶等等取衣車空等等取極微此不㝎中所言共者如有論言聲有法常宗是所量度而知之法性故因此式云何知其不定為同品之常異品無常皆共此因所攝是故判其不定云何顯不㝎之義謂詰彼論主為如共許有生滅之瓶等異品所量性故成立聲是其常耶蓋瓶等空等皆由量度而知其常與無常則所量之因兩者俱可成淂何以顯聲之㝎有常性其非決㝎可知此條或是聲明論被破斥已轉計作此遁辭意明詮表非是所作是所度量而成之法所作雖無常所比量之理性則非生滅可立是常豈知又犯共不㝎之過此條之過違異品遍無最顯于初相遍而不是問此條詰問云云即是破彼之辭何必三支圎滿方稱能破答此中詰問符合斥量非圎彈支有謬清涼云滅為能破此專為破他自不立論之式也𠰥彼此立論而共比量則必三支圎滿第二式言不共者如聲常所聞性故常無常品皆離此因常無常外餘非有故是猶豫因此所聞性其猶何等離即不共猶豫不㝎也亦名疑因餘非有者謂其餘品類非此宗所應有義猶何等者謂同異品外猶何等品類所言不共不定者如有云聲有法常宗所聞性故云何知其不共為常之同品無常異品皆離此所聞性因義故名不共不定若常與無常外之餘義又非此宗所應有故以此因成所立是無交涉之猶豫因也既與同異品無涉此所聞性之因義其猶何等品耶無同異品豈成因義掌珍論云如計音聲常住論故聲是常所聞性故瓶等無常非所聞性聲既所聞是故性常此條亦疑聲明被破之轉計所作雖無常所聞之聲境是實有彼計外境是實是常住故所聞乃耳識聲界共所許故豈知又犯不共不定之過不共則無同異品于初相遍而不是夫同異不共直是無因龍樹云若別異者應無有因別異即不共義離義護法云夫比量者比知共相以果等總相比知因等總有所立思我由不共故無同法喻同法喻既無異法喻亦非有無對待故按此是共比量之義須是共許亦須與宗共義若不共者與宗無涉故無同異品與此條可𭆤𮗚第三式同品一分轉異品遍轉者如聲非勤勇無間所發無常性故此中非勤勇無間所發宗以電空等為其同品此無常性于電等有于空等無非勤勇無間所發宗以瓶等為異品于彼遍有此因以電以瓶為同法故亦是不定為如瓶等無常性故彼是勤勇無間所發為如電等無常性故彼非勤勇無間所發雷之發光為電此宗依聲而言則言電即雷也聲有三種一因執受大種謂語等聲一因不執受大種謂樹等聲一因俱大種謂手鼓等聲擊之手是執受鼓是不執受今以電聲為同品則兼此三種聲非但詮表之執受大種而已于依也電等等取樹聲同喻名同法所言同品一分轉異品遍轉者如有云聲有法非勤勇無間所發宗宗無常性故因云何是此式過義為此量中非勤勇無間所發宗支比其品類應以電及空等為其同品電非人力勤勇無間所發空則無藉于發故是同品然此無常性之因相依于電等有無常相依于空等無無常相是同品僅有電等一分轉又非勤勇無間所發宗支應以瓶等為其異品瓶等必須勤勇無間所發的是異品然于彼瓶等遍有此無常因相是異品遍轉也言不定者謂此因以電同以瓶異並為同法之喻故雜異于同因義混淆故雖略具同品一分亦名是不定因也云何顯不定之義謂詰彼論主汝立論之意為如瓶等異品無常性故彼瓶等是勤勇無間所發耶為如電等同品一分無常性故彼電等非勤勇無間所發耶二皆具無常因義合于宗法有是有非豈非不定解深密經云𠰥于此餘同類可得相及譬喻中有一切異類相者由此因緣于所成立不決定故又于此餘異類可得相及譬喻中有一切同類相者由此因緣于所成立不決定故按此條及下二條皆同異夾雜如經所言不決定因此條或是聲顯論被破後轉計立此即勤勇無間所發義立為宗支以無常因成立非勤發宗彼以待勤發緣中具有性以是勤發為常也豈知又犯第三之過同異品之電空瓶等俱是共許共許決定彼不定因之相顯然可詰此條從共不定分出彼寬此狹因三相中全與異品遍無相翻其非遍是宗法可知第四式異品一分轉同品遍轉者如立宗言聲是勤勇無間所發無常性故勤勇無間所發宗以瓶等為同品其無常性于此遍有以電空等為異品于彼一分電等是有空等是無是故如前亦為不定此式就前式而翻之宗上翻非作是因則仍前故同翻為遍異翻一分矣所言異品一分轉同品遍轉者如有成立宗者言曰聲有法是勤勇無間所發宗無常性故因云何是此式過義謂此勤勇無間所發宗應以瓶等為同品然其因上無常性依于此瓶等則遍有其義應以電空等為異品于彼一分電等是𪠥無常義于彼一分空等是無無常義同品因相無異品中雜有無常義是故如前一例亦為不定因也此條或是破前條而立故即其量而翻之謂可成立是勤勇無間所發也豈知將因作宗將宗作因兩易其位則宗狹因寬以寬成所成之狹則因中雜有釁端犯不定之過若將因三相核之違第三相之遍字其于遍是宗法性亦而不圎矣第五式俱品一分轉者如聲常無質礙故此中常宗以虛空極微等為同品無質礙性于虛空等有于極微等無以瓶樂等為異品于樂等有于瓶等無是故此因以樂以空為同法故亦名不定同異皆具曰俱質礙者體質有礙樂喜好也虛空等等取彼論所許無質礙而常者樂等等取苦瞋所言俱品一分轉者如有言聲有法常宗無質礙故因云何是此式過義為此量中常宗應以汝所許之虛空極微為其同品然此無質礙性因于彼一分虛空等則有其義于彼極微等汝許質礙則無其義是同品僅有一分轉也此宗應以汝許之瓶樂等為異品而此無質礙性于樂等無常則有其義于瓶等無常則無故異品亦犯一分轉是故此無質礙因以樂異以空同為同法之喻故因中雜攝異品是以亦名不定俱舍論云極微微金水兔羊牛隙塵蟣虱麥節後後七倍增智度論云微塵有三等大者遊塵可見中者諸天可見小者聖人天眼見此內教所許極微也數論計五微生空風火水地此外道所計極微也勝論計地水火風意五者有質礙計空時方我四者無質礙此文空等等取時方我又計四大非所造者常故許極微常亦許極微質礙極微等等取意彼德句中十三樂十四苦十五欲十六瞋樂等等取其餘彼計無常此條或是聲論所立核空等微等樂等句又似勝論所計或者聲論出自勝論後人此條亦違因第三相之遍無字其非遍是宗法可知第六式相違決定者如立宗言聲是無常所作性故譬如瓶等有立聲常所聞性故譬如聲性此二皆是猶豫因故俱名不定聲性者聲之自性待緣而顯彼計緣顯無常自性則常相違之義兩論決定無從顯其此是彼非何勞立量共諍所言相違決定者如有對他論成立宗法者乃言聲有法是無常宗所作性故因譬如瓶等或有對前論成立宗法者乃言聲有法常宗所聞性故因譬如聲性此二因者此成此宗彼成彼宗此不能立己破彼彼不能立己破此彼此異向無論其理非正無論其自義之能成所成與否皆判是猶豫因故兩論相違于此決定而不能定其誰勝誰負故俱名不定也此條初量是破聲明之量以之對聲明則可若對轉計之論則無涉次量不必論及對他已犯不共不定𠰥對前論而亦無涉故俱為猶豫因也彼以聲性為喻者謂所聞緣顯之聲中具有性譬如未顯之聲性是常也其喻亦犯過此不具問不定是因過云何陳喻答喻依因出因由喻顯是以因三相中並陳同品異品前數條文瓶等空等電等微等樂等何獨此條方陳譬喻問此條闕正因何相答初量具三相而仍三相何以故非是敵許極成之宗法性縱具同品異品于敵無預與無品同初量尚犯次量可知問過𣢾有不成相違此六過言不定云何差別答不成者依對他而他不容我成故此則不論義不正若他所不許總不極成相違者約己義己義既犯相違如何能令他許不定者從相違分出或義中多分少分相違或多分少分不相違或不必較及違不違或與共諍義相違則猶豫兩可皆名不定如上六不定過若對本教人犯過則少如修多羅有法是了義宗佛所故因了義不了義品皆共此因是共不定而對教中人則無過他過可推簡別宗鏡録云夫決定相違不定過立敵共諍一有法因喻為異皆具三相遍是宗法性同品定有性異品遍無性但互不生其正智兩家猶豫不能定成一宗名決定相違不定過此釋非理立敵共諍是常無常三支為異非止因喻次量聲常三相不具前已顯為不共不定常無常品皆離此因豈是定有遍無二量竟如不對他論而立不消及悟他生智相違決定決定相違義相差別不可等視問龍樹云若法是不共共決定相違遍一切于彼皆是疑因性將何以解答此是攝頌攝不定六過及相違四過不共與共攝前初二四五不定決定攝相違決定相違攝下條四相違第三句第三不定彼字異品不可將決定相違作一義也
