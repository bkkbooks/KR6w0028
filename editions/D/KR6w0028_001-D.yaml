body:
  text: 因明入理論初因字因者至教之正因也一切法上皆具正因諸佛菩所皆正凡夫外道迷謬不知迷謬之徑千差萬別約之不出二種一者邪因但有言語都無實義二者無因惡取空無墮于斷見令此題上因字即顯非是無因繼以明字即外執暗昧是以借俗所詮建立本意即囙可以明藉明足表因正清涼觧因字具有四義一所由義由者所自出之路也凡𦀇道路由此徑而得至所立道理由此義而得成二所以義所以然之成也有所當然必有所以然抉其原故理始淂成三順益義順則不違益則不害不違不害成而無壞四待藉義觀待于彼此理得決定藉賴其佐助理淂圎滿四義有通有別而順益為㝡重此義可攝彼三𠰥將此論因言之如聲無常宗因云所作性故由聲是所作性所作决定無常是所由義所作性緣而生緣息則滅顯聲所以無常之故是所以義所作性順於無常之理有益于無常之宗是順益義𮗚待于所作非所作而藉賴此所作性以顯無常是待藉義𠰥能破中之現比相違多分是所由所以能所別不成多分是順益待藉所由所以是正因順益待藉是方便因順益之義出自瑜伽論云辨因者謂為成就所立宗義依所引喻同類異類現量及与正教建立順益道理言論又云復次因是順益義縱令略得所由所以少分而或稍有不順宗成無益皆違此義故曰順益可攝彼三𮗚待之義亦出瑜伽論云依領受依処施設𮗚待因又云𮗚待此故此為因故于彼彼事若求若取大都自立比量多從所由所以他共比量多慿順益待藉即如似立似破諸因彼亦自謂符合因義如猶豫不成之因云以現煙故畧得所由然違待藉法自相差別相違之因云積聚性故畧淂所以然違順益共不定之因云所量性故畧淂待藉然違所由不共不㝎之因云所聞性故畧淂順益然違所以是以觧因明者不得畧此四義若闕一義因義未全清鿌又解囙相云囙相有二謂生因了因立宗之義由因生起成立之義由因了別此則舉十因以解量之因相十因中生起囙生因餘九皆了因攝然宗因之因隨因攝生与了皆隨中生了之義護法菩云因有三種一有體法如所作等二無體法如非所作等三通二法如所知等又云雖無生因而有了因有因總故即為極成龍樹菩云今此唯依證了因故但由智力了所故非如生因由能起用清涼與此二以有差別然清涼依隨之生起義而理無違礙瑜伽云因相有七種由此為先一此所建立二淂和合故三彼法淂生四淂成五或辨六或用七此為彼因此七種相一切因皆具由此為先者所由義此所建立所以義淂和合故順義𮗚待義淂生淂成藉賴義或辨或用益義依宗因之義符七種相次明字明字具六義一明其軌則軌則秩然向背可辨二明其圎圎滿示成減示破三明其體用現量為體比量為用四明其理事理有正邪事有損益五明其𭥍趣鈍根知𭥍利根淂趣六明其對待對敵表待言簡別六義之別兩義通攝一者明作具二者明作智又明有四相一者明了不作疑言必示決㝎二者明顯不作巧言令人易會三者明𢘻不作漏言盡其究竟四者明照藉此光明照彼闇昧因明合囙是所明明是能明攝所歸能明義為重依因而明明由囙起因相為主又因正以兩種明攝邪正二途非明不辨正以非因不顯正邪和合言之方起功用若依六𥼶囙是自體明是業用合言因明待業釋也問量具三支云何獨舉因答清鿌云就比量中有許未許為成未許必有能成即能成是囙所成是果宗由囙顯義淂分明此即囙果雙彰理無違妨古德云獨言囙明者因有力故宗非因不顯喻非囙不立葢由因淂明攝所能依最勝故此論摽以囙明因為量主故華嚴稱為囙量因能成宗故瑜伽表以因成舉因專重之義也瑜伽云云何是囙明処為扵𮗚察義中諸所有事清鿌𥼶云所建立法名𮗚察義能隨順法名諸所有事諸所有事即是囙明為囙照明𮗚察義故𠰥在此論于中諸所有事囙支可攝是故但標囙明淂括一論本義次入理入者觧路所由隨順而進囙明是能入理是所入囙明如道路理如所至処由道路至彼処斯謂之入理者有三義一不偏二不差三決空理有二義一條理不紊不亂二脈理可貫可通理有四一法爾道理二證成道理三𮗚待道理四作用道理解𣸧密𦀇云若囙若緣能令所立所所摽義得成立令正覺悟是名證成道理此約總義而談多分而論中正以竝陳𮗚察立破義兼𮗚待現量所證非空法爾成立功能亦有作用此理者稟受至教印定二量由理顯理以成合云理體用備表雙彰理義趣無窮一切𦀇教皆是此但云入具有裁酌不云淂正理者此論僅列方隅未昭閫奥能信受者但能信淂未能修淂然凡外之趨向既定由此可以起修故名曰入不云證理者論中但有辨別未具證明即現量一門秖世間共之現量未不共世間清淨現量然由此知共現量境可希不共現量境故名曰入不云顯正理者此論但顯條例方隅言辭過犯未顯人法二空五法三性𠰥至教中真諦元門皆緣避非共許無暇宣陳設凡外知過悔非歸依正道然後示其堂奥故名曰入不云具理者囙明理因緣因果一切可攝此論但就隨囙中分別圎但就士用果中其二益扵理未備故名曰入合囙明入正理論六字囙明二字俗書所同雖此明字異于世俗所明然無表別今首冠因明示同俗號表以入理令其棄俗歸真其非理令其破迷捨謬非囙明不能令入非理則所入皆邪瑜伽云諸外道因明論名邪義論名虚偽論是三種論中之諍訟究竟論欲簡別此等故名因明入理論也論有二種疏法𦀇文名為𥼶論依𦀇立義名曰宗論此屬宗論商羯羅主菩造梵語商羯羅主許敬宗後序稱為天主則是上三字是梵主字是華華梵和合而稱也諸疑非的翻攷敬宗得侍奘躬親監譯此稱傳自譯不由臆決若于此起疑則此論譯文皆可疑矣論主菩依陳那因明理門論畼宣文句剖析細微其所敷揚不出陳那軌範故談因明者猶推屬扵陳那也菩義見常𥼶茲不重述造者作也依𦀇運義造作文句唐三蔵法玄奘譯唐者李氏繼隋有天下之國號𦀇律論三皆為法蔵故名三蔵通此三蔵教文宏揚大法為世表故名法玄奘乃之名其行跡本傳可撿唐天子賜號為三蔵法翻西竺梵言轉成此邦文句名之為譯正科分三初攝頌中分末結頌今初能立與能破及以唯悟他現量与比量及以唯自悟如是總攝諸論要義初四句是頌末句明攝義一能立二能破三以立四以破五現量六比量七以現八以比是名八門前四悟他後四自悟是名二益立破現比是四真餘四是四以𫝑力有用足勝其任曰能施設卓爾不傾不𠋣曰立有隙可乗如石解曰破貌以中非含虚抱偽曰似智所知自淂勝解曰悟當前觸對根境符合曰現如見而知揩則不謬曰量比度𮗚察同異叅尋曰比包括無道曰攝扼其腰領曰要頌曰能立与能破二門及以立以破二門唯屬悟他現量与比量二門及以現以比二門唯屬自悟如是八門二益總攝破邪顯諸論之要義邪論莫逃扵四似論不外扵四真顯破邪總為悟他自悟也清鿌云囙明八義者一對量申敵三分圎明開曉于賓故名能立二斥量非圎彈支有謬示悟于主故名能破三對敵申量三支闕謬非曉于敵故名以立四妄斥非圎彈支有謬不悟于主故名似破五于色等義有智生自相處轉故名現量六謂藉眾相而𮗚于義相應智起故名比量七有分別智扵義異轉了瓶衣等名以現量八以以因智于似所比相違觧起名以比量瑜伽論云囙明有二相轉一者顯示摧伏他論勝利相二者顯示免他論勝利相此二相義攝盡囙明地持論云囙論二種一者能屈他論二者自申己義前論言唯他論𠯁見重在悟他後論言自申己義亦謂對他而申此論稱自悟者為非自悟安得悟他三支立量原以示人若自己智明何必申量曉己一切𦀇論皆為悟他而分分八一能立二以立三現量四比量五以現六以比七能破八以破今初能立門分三初總次分末合結今初此中宗等多言名為能立由宗因喻多言開示諸有問者未了義故宗主義也因依也依此義而立宗出喻也喻譬如也一字為一言故曰多言開其蒙蔽示以顯了曰開示或未觧其義或少解有疑皆云未了謂此能立門中所宗等多言名為能立云何此多言謂由此宗一囙二喻三多言三支圎滿能開示彼諸有來問者令彼未了其義者得了知故未了而了成悟他果有來問者言聲無常答以聲無常宗問云何知無常答以所作性故因問云何知所作性無常答以喻如瓶等量文約伏難而申言也內含問答之義故言諸有問者分分三初宗次因末喻今初此中宗者謂極成有法極成䏻別差別性故隨自樂為所成立性是名為宗如有成立聲是無常極成者極䏻成就也真有假有俱稱有法䏻別者䏻於有法中別擇一法建立之也與此不等曰差彼有殊性曰別性者法之體性也樂喜好也謂此䏻立門中所言宗者所謂極䏻成立有法極䏻成立䏻別云何两種俱要極成為两種無有差別性故差別中隨自己喜樂揀擇一法可和合為主義者立為所成立性是名為宗其式𠰥何如有成立聲有法是無常宗即其式也有法有五名一有法二所別三所成四宗依五前陳宗有五名一宗二法三䏻別四䏻成五後陳古䟽云前陳是有法後陳是法灋與有法和合為宗前陳有法但是持自性法無有軌義後陳䏻別䏻持自性又具軌法及至和合為宗以一宗字攝之故必二種俱淂極成方成宗法問瑜伽云極成四種真實義此屬何種答是第二道理極成真實論云依止現比及至教量極善思擇決定智所行所知事由證成道理所建立所施設故集論云立宗者謂以所應成自所許義宣示于他令彼解了所以者何𠰥不言以所應成者自宗已成而示他應名立宗雖是有別非我功䏻若不言自所許義示他宗所應成義應名立宗雖有功䏻而無別義若不言令他解了者𦗟者未解此義應名立宗無悟他果𠰥如所安立無一切過故建立我法自性若有若無我法差別若徧不徧具𠯁前相是名立宗瑜伽云立宗者為先顯示自所愛樂宗故雜集論云證成道理者謂為證成所應義宣諸量不相違語所應義者謂自體差別所攝所應成義諸量不相違者謂現量等不違立宗等言故清鿌釋云自體差別者即聲為自體常無常等而為差別又色是自體形色顯色表無表色而為差別按自體者有法之自性自性有自相共相共相上即有差別故有法雖同而取以為䏻別者彼此相望定有差別瑜伽云所成立有二種一自性二差別自性者謂有立為有無立為無差別者謂有上立有上無上立無上有常立為常無常立無常等集論云所成立自性者謂我自性法自性若有𠰥無所成立差別者謂我差別法差別𠰥一切徧𠰥非一切徧𠰥常無常等無量差別瑜伽云立宗者謂依自性差別二種所成立義各別攝受自品所許或攝受論宗若自辯才𠰥輕懱他𠰥他聞若覺真寔或為成立自宗或為破壞他宗或為制伏于他或為摧屈扵他或為悲愍扵他建立宗義由此𥼶之立宗有二種一者攝受自品所許二者攝受他論之宗自比他比無有二因一由自辯才而立二由輕懱他而立䏻立䏻破又二因一他聞解而立二自覺真實道理而立一由聞至教二由現比量所立有二種一成立自宗二為破他宗䏻立䏻破破他宗有三因一為制伏他外道二摧屈于他教中人非理三為悲愍他意在悟他非是諍論今將聲無常宗一一明之聲是前陳先是有法耳塵所有是宗依無常義依聲而無常是後陳後是法生滅法是宗主義無常䏻別于常宗所別是聲䏻成無常宗所成是聲聲以所聞性為自性以大種執受不執受為差別有法有聲無聲為自性常無常為差別從宗隨自所愛樂于差別性中思擇無常義而立為宗于聲之執受不執受差別義畧無違礙是為極成有法無常䏻別于常是謂極成䏻別此二和合成立聲無常宗問何故特舉聲無常宗答依至教量而故依古德舊立故凡外共許故聞者易解故急外道故後顯兩因故有此六義是故特舉次因分二初次合法今初因有三相何等為三謂徧是宗法性同品定有性異品徧無性云何名為同品異品謂所立法均等義品名同品如立無常瓶等無常是名同品異品者謂于是處無其所立若有是常見非所作如虗空等宗法性者宗法之自性宗法者宗亦名法也同品異品猶言同類異類同品不必徧有秖要定有異品不但多分無且要徧無所立法即宗法因䏻立宗故宗是所立均則無差等則無別義品者宗義之品類瓶箸等取衣車是處者隨法所之処扵依也無其所立者全遣其所立宗也虚空等等取極微所囙支具有三種義相何等為三耶一者謂徧是宗法性約宗上二者同品決㝎有之法性三者異品普徧無之法性具此三相方名因云何名為同品異品耶同品者謂與所立宗法性是均同齊等之義品名同品其式𠰥何如有立無常宗者瓶等緣散則滅義屬無常同品式也異品者謂于是宗法性處無其所立宗義與宗敵體相翻名異品与無常相反是常与所作性相反是非所作故言之則云是所作性故見其無常若反言之則云若有是常義者須見其非所造作其式𠰥何非所作而常者如虚空等異品式也瑜伽云何故次辨因耶為欲開顯依現見事決定道理令他攝受所立宗義故又云辨因者謂為成就所立宗義依所引喻同類異類現量比量及與教建立順益道理言論故集論云立因者謂即于所成未顯了義現量可淂不可淂等信解之相信解相者是信觧囙義所以者何由宣現量可淂不可淂等相故于所應成未顯了義信觧淂生是故彼相乃名立因現量可淂不可淂者謂依自體及相貌瑜伽云同類者謂隨所有法望所餘法其相展轉少分相以此後五種一相狀相以二自體相以三業用相以四法門相以五因果相以相狀相以者謂于現在或先所見相狀相屬展轉相以自體相以者謂彼展轉其相相以業用相以者謂彼展轉作用相似法門相似者謂彼展轉法門相以如無常與苦法苦与無我法無我与生法生与老老与死法如是有色無色有為無為等無量法門展轉相以似囙果相以者謂彼展轉𠰥因𠰥果䏻成所成展轉相以是名同類異類者謂所有法望所餘法其相展轉少不相以此亦五種与上相違應知其相按此瓶等喻与所作性作用相以之同類虚空之喻同類徧不相以故是異類念西居士云此所作性理于無常聲法決㝎有性名徧是宗法性理扵瓶等同品法㝎有所作名同品㝎有性望于空等異品法徧無所作名異品徧無性是處者異品處也宗与因對同品敵體相翻方為異品無之一字非止相違別異而已同異二字宗品字喻㝎有徧無四字則屬扵因因本上依宗下含喻一量樞紐仗因貫通同在共相中名同品全違自相名異品𠰥違自相不但差別全與均反不但參差全與等反故云無其所立問云何是均等義品㝎有義答瓶等均有無常之義等是無常之法然非徧有何以故無常有五種一變易二滅壞三別離四法性五合會瓶等不徧有五種而有變易滅壞性既有二種則是㝎有𠰥虚空等則徧無此五種相次合法此中所作性或勤勇無間所發性徧是宗法于同品㝎有性異品徧無性是無常等因所作者有為法所造作也勤勇無間者力䏻無間也無常等等取無我由前文合觀之此文中所作性之因或別勤勇無間所發性之因是二因者徧是宗法性于同品㝎有無常所作性于異品徧無無常所作性是聲無常宗等之因所作性一因舊師對聲明論而立勤勇無間所發一囙對聲顯論而立二論皆外道論所造舊立量以破斥之故引以為因式廣百論釋云有餘徧執明論聲常初不待緣後無滅壞性自䏻顯越諸根義為決㝎量曾不差違故言聲常䏻為㝎量次執一切聲皆是常聲徧諸法待緣則顯顯時方詮表諸法按聲顯論為明論有漏義轉計待緣而顯是彼同教中人所造勤勇無間所發性理于聲無常宗徧是宗法性對聲顯論則徧望同品㝎有勤勇無間所發望異品徧無勤勇無間所發亦具因三相故名因問聲有三種一執受大種聲二不執受大種聲三執受不執受大種聲初謂內緣聲次唯外緣聲三內外緣聲又聲者謂鳴音詞吼表彰語等差別諸名此二因豈䏻盡攝答䏻攝二論所詮表之聲則已徧是宗法性矣何須盡攝葢有法甚寛則有差別及和合扵宗則已簡玄差別而成宗法則較有法稍狹囙但攝宗之狹不必較論于寛處也然內緣外緣聲言緣便有所作所發義𠰥非所作非所發不必待緣始有囙明理門論云由此道理所作性故䏻成無常及無我等不相違故故云等字等取無我問云何所作性成得無我答計有我者不出五蘊五蘊皆緣生緣散則滅緣則待所作而有𠰥非所作則無是以成淂無我末喻分二初次釋妨今初喻有二種一者同法二者異法同法者𠰥于是處顯因同品決㝎有性謂𠰥所作見彼無常譬如瓶等異法者𠰥扵是處所立無因徧非有謂𠰥是常見非所作如虚空等喻譬喻也同法異法同品異品中所有法也所立所立宗也所立無者宗義全無也𠰥喻支則有二種一者同品法性二者異品法性所言同品法者謂𠰥于是同喻処䏻顯前因同品決㝎有性合扵同品㝎有性是名同法其式𠰥何謂𠰥是所作性共見彼決㝎無常譬如瓶等可證也所言異品法者謂𠰥扵是異喻處可所立宗義全無于因上亦徧非有合扵異品徧無性是名異法其式𠰥何謂設𠰥是有常性者除非共見非是所作譬如虚空等可證也瑜伽云次引喻者為欲顯示䏻成道理之所依止現見事故又云引喻者亦為成就所立宗義引囙所依諸餘世間串習共許易了之法比况言論也顯揚論云喻者見邉義所見一邉謂以所見邉与所未見邉和合名之為喻子覺云所見邉者謂已顯了分未見邊者未顯了分以顯了分顯未顯了分會義平等所有名為立喻解深密經云自類譬喻所引相者謂于內外諸行聚中引諸世間共所了知所淂生死以為譬喻引諸世間共所了知所淂生等種種苦相以為譬喻引諸世間共所了知所淂不自在相以為譬喻又復扵外引諸世間共所了知所淂衰盛以為譬喻如是等類當知是名自類譬喻所引相護法菩云又諸比量欲餘義要有同法然後方成同法𠰥是無異法應非有又云唯異義所事境名為同喻其異法喻二分俱行可名為徧𠰥無同喻何所徧邪又云喻則是一分所攝因既俗有喻亦應然按同喻是詮者別如是龍樹菩云前是詮同喻後是止濫由合及離比度義故為要具二譬喻言詞方成䏻立為如其因但應一𠰥就理應具二由是具𠯁顯示所立不離其因以其顯示同品㝎有異品徧無䏻對治相違不定故𠰥有于此一分已成隨一分亦䏻成立但同喻𠰥如其聲両義同許俱不須但囙無喻或由義唯一䏻顯二同可顯異又比量中唯見此理𠰥所比処此相㝎扵餘同類念此㝎有于彼無處念此徧無是故由此生決㝎解可無喻故本頌言如自決㝎已希他決㝎生宗法相應所立餘離按此論廣喻之應有應無㝡為明晰然不可以例對敵申量者念西居士云云何知所作性淂成無常合辭曰共見一切所作性者皆是無常如彼瓶等是也云何此因翻彼常宗離辭云𠰥是常者㝎非所作如虚空等是也合辭當因先宗後離辭當宗先因後語勢如此次𥼶妨此中常言表非無常非所作言表無所作如有非有名非有恐有難曰離辭顯虚空常以非所作成所成豈不自教相違為防此難故𥼶之曰此離辭中常之一言止為表彼非無常義原非成常非所作之言止為表其無所作性原非立無所作譬如因有斥為非有但表與有別異名非有既非有已復何成立龍樹云無常宗中無異品常宗中無同品𠰥立為常違自教故即此難意也護法云今所立因唯所作不言別有非所作性又云無宗𠰥有對立有宗無宗𠰥無有宗何對如非有言唯其有不詮非有亦不表餘又云如在夢中所緣皆妄非如夢智所計空等常住實有而可信依問瑜伽云有立為有無立為無非有同無如何可通答立無之義為遮他有有既遮已所依亦無但是立遮竝非立表雖名立所立是無隨立隨不成立相問大智度論云摩訶衍中虚空名無法不得常不淂無常不淂言有不淂言無非有非無亦不可淂此云何通答彼明般𠰥心言路絕之㫖義本如是𠰥對敵申量敵論不許無悟他果故必依俗所淡令他易觧有無皆設許義不淂以彼例此末合結分二初合末結今初已宗因等如是多言開悟他時名䏻立如聲無常者是立宗言所作性故者是宗法言𠰥是所作見彼無常如瓶等者是隨同品言𠰥是其常見非所作如虚空者是離言如上已宗因等等取同異喻如是多言𠰥淂開悟他時方可名䏻立今多言明三支圎滿如聲無常者是立宗之言所作性故者是宗法䏻成之言𠰥是所作見彼無常如瓶等者是合辭隨順同品之言𠰥是其常見非所作如虚空者是離同品隨異品之言瑜伽云不相違者亦二因緣一決㝎故二異所成故不相違者于為成就所立宗義䏻為量故名為量按論言決㝎者即此宗因喻三支圎滿決㝎成立也異所成者謂極成䏻別解深密經云即如是現見所淂相𠰥依止現見所淂相𠰥自類譬喻所淂相扵所成立決㝎䏻成當知是名圓成實相按此䏻立相即後二相所作性因後文言對聲顯論即為過犯何以故不悟他故故文中言開悟他時名䏻立雖䏻自悟對敵無益末結唯此三分名䏻立三分即三支古疏云芟夷五分㝎取三支䏻立之分有五有三今立量楷則唯取此宗囙喻三分名䏻立龍樹云于所比中除此三分更無其餘支分由是遣餘審察等分及与合結分按論有五分宗因喻三及審察合結二詳見集論𠰥立量則但取三分䏻立門竟
