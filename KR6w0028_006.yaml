body:
  text: 三四現比量門分三初總次分末顯果今初復次為自開悟當知唯有現比二量復為論列就前文依次而曰若欲為自家開示悟入當知惟有二量可攝謂現量比量問上文已真似二能立門未談真似二能破何故即現比二量答真能立者惟其悉知真能破故可極成能立能破如稱兩頭低昂立現無煩重說似能破義推此可知是以真似二門竟別自悟四門及末始列真似能破二門略點𢿘語分分二初現次比今初此中現量謂無分別若𪠥正智于色等義離名種等所有分別現現別轉故名現量先現量相論主謂現量有四此文中意不盡攝且聖凡所共之無分別智云何謂之無分別言人若𪠥五法中之正智于色心法等義能離名言種子等所有分別故名無分別雖無名種分別然以現行識緣現前境能了別而轉唯有智行非是虗𡚶分別故名現量集論云無分別智復離五相謂非無作意故非超過故非寂止故非自性故非于所緣作加行故名無分別所以者何若無作意名無分別𤍨眠醉等應是無分別智由彼不思惟諸法相故若超過故名無分別從第二靜慮以上一切地應是無分別由彼超過尋伺故若爾三界心心所法是分別體言即為相違若寂止故名無分別滅受想定應是無分別智分別心心法于彼寂止故若爾智亦應無若自性故名無分別色等應是無分別智彼非分別自性故若于所緣作加行故名無分別即分別性應是無分別智若謂此是無分別此加行相即分別相應是故無分別智非彼五相五法者一相二名三分別四正智五如如廣如楞伽經地論所此中但離相名分別之正智不攝如如之正智大寶積經云所言智者于內寂靜不行于外惟依于智不于一法而生分別及種種分別是名為智又云無取無執無有所緣無所了別無有分別是名為智此是如如之正智非此中所地論云現量者略為四種所有一色根現量謂五色根所行境畍如先所現量體相先所說詳見後注二意受現量謂諸意根所行境界如先所現量體相三世間現量謂即色根意受總攝為一四清淨現量一共謂諸所有世間現量亦得名為清淨現量二不共謂有清淨現量非世間現量謂出世智于所行境有知為有無知為無有上知有上無上知無上如是等類按此中現量乃共清淨現量非不共清淨現量解深密經云證成道理由五種相名為清淨一者現見所得相此為世間現量所得故此契經世間之共清淨現量也色等等取色心法名種等等取習氣隨眠粗重地論云現量有三種一非不現見二非已思應思三非錯亂境舉第一非不現見有四種一者諸根不壞作意現前相似生故相生者如欲界根現欲界境上地根得上地境已生已等生若生若起皆是也二者超越生故謂上地界根現下地境已生等如前三者無障礙此復四種一非覆障所礙二非隱障所礙三非映障所礙四非惑障所礙黑暗無明不澄清色名覆鄣藥草力術咒力神通力為所造境名為隱障小為大映少為多映星為月映不淨映淨無相映相是名映障無此四種名無障礙四者非極此復三種一處極二時極三損減極以上總名非不現見第二非已思應思者復有二種一才取便成取所依境謂若境䏻作才取便成取所依止猶如良醫授病者藥色香味觸皆悉圎滿有大𫝑力成𤍨威德當知此藥色香味觸才取便成取所依止藥之所有大𫝑𤍨德病若未愈名為應思其病若愈名為已思二建立境界取所依境謂若境能為建立境取所依止如瑜伽于地思惟水火風界若住于地思惟其水即住地想轉作水想住水火風思惟餘者亦復如是此中地想即是建立境畍之取地者即是建立境界取之所依建立境界取所依境非已思惟非應思惟地等諸界解若未成名應思惟解若成就名已思惟第三非錯亂境界者復分五種或有七種五種者一想錯亂謂如陽𦦨于𢉖渴想中起水相二𢿘錯亂如目翳眩人見第二月三形錯亂如于旋火見彼輪形四顯錯亂如病眼者見色悉是黃相五業錯亂如結捲馳走見樹奔流現現別轉四字現現釋現字別轉釋量字四字次第有表第一現字表是現前顯現義如諸根不壞是識䏻現作意現前方成現行第一現字義也問凡作意時皆成現量耶答以第二現字表之須是現境如本界現本境上畍緣下地現前境無有障礙境相顯現問現識緣現境成現量耶答以第三別字表之須是了別若極遠則境不可了識不能了若已思應思則現在不了問已了別者得成現量耶答以第四轉字表之須是轉似若錯亂等識雖了境而不能轉何以故不轉似本相故此四字核定共世間清淨現量義足問前似宗過條有現量相違與此現量同否答前是第三世間現量此中是第四之一共清淨現量此可攝前前不能攝此問地論云正尋思如是道理有至教量有內證智有比度法有立成法性云云內證智即現量否答即是離名種等所有分別是內證此分別即正智問論云現量為依名思惟思惟是緣心云何是現量答但為依不思惟即是又出世智之所行境言語道斷心行路絶此中且言語道斷未及心行路絶思惟亦得心所有思想二識行必俱了別轉時豈無心所問論云若見若思二種言是依現量如何離名言之分別為言所依答即𡚶依真起義問此量名自悟門能悟他否答亦能悟他既是世間共清淨現量若不可悟他云何名世間共問然則何以判入自悟答凡夫異生各各可以自悟故名自悟不待比度義相能成能破他始悟也故非悟他次比量言比量者謂藉衆相而𮗚于義相有三種如前已由彼為因于所比義有正智生了知有火或無常等是名比量次比量相藉者藉賴𮗚者𮗚察義者宗之義相言比量者謂藉彼衆相而𮗚察于宗上義相得決定也言衆相者謂相有三種一遍是宗法性二同品定有性三異品遍無性如前文因有三相條中曾已示云何言藉言觀義謂由彼三相為因于所比知宗義有內證之正智生起能比是智所比是義所謂比也如見煙故了知有火或所作性故了知無常等此所了知所謂量也是故名比量此中正智依止現量而得由彼比義而生了知謂正智所了知也二種比量一者五識所現見比知事物二者意識依止現量比知道理見烟是現量所作性依現而知故表以或字無常外有苦空無我等故表以等字地論云比量者謂與思擇俱已思應思所有境界此復五種第一相比量謂如見幢知有車見烟知有火以王比國以夫比妻以犎等比知是牛以膚髮容色比知老少以執持被服比知道俗以樂聞遠離比知正信以善善作比知聰睿以所造所得比知聖凡以見彼少年故雖老時見比知是彼第二體比量謂以現見比未現見我見一分比其餘分如以過去比知現前以近事比知事以現在比知未來又如飲食等一分得失比知一切第三業比量如見物鳥居其上比知是動搖移走比知是人大跡比象曳行知蛇嘶知是馬咆知是牛見比于眼聞比于耳灰熱比知有火枝掉比知有風執杖知盲側聽知聾所造所行比知聖凡等類無量第四法比量如無常比苦苦知空無我生老死法由一比一有見有對比有方所及有質礙生住滅法比知有漏有為否則無漏無為第五因果比量如見有行比知至處見善事主比知祿位人作善惡比知獲報預卜興衰見食多少知其病否凡見修因必知得果如上等事若見得果亦比知因按前節指第三四五比量了知有火依第一無常等依第四集論云比量者謂觀餘信解此復云何謂除現量所得餘不現事決定俱轉先見成就令現見彼一分時於所餘分正信解生謂彼于此決定當有由俱轉故如見煙知彼有火是名現量為先比量按此論言謂比量以現量為依故此正智即依現量之正智而名解深密經云五種清淨相第二名依止現見所得相謂一切行皆剎那性依他有性淨不淨業無失壞性由彼能依粗無常性現可得故由諸有情種種差別依種種業現可得故由諸有情若樂若苦淨不淨業以為依止現可得故由此因緣于不現見可為比度按此即集論所依而清涼疏鈔云自他共等三種比量自立之量如婆多立無表色量云我無表色定是實色許色性故如許色聲等此即自比量謂自立義令他也此乃似能立非真能立引之但明自比非表正量他比量者于他立中出他宗因過如大乘破婆多云汝無表色非定實色許無對故如心心所此是真能破三共比量者又于他立中出比量過問此中比量三種中何種答是自比量然但其義相不量支量則有喻而此處不顯為求自悟唯依現見比知無煩出喻故前節比量之義此節比量之例問能立能破皆是比量云何攝入自悟答現量境離名相自悟為多比量依現而起言既能自悟又能悟他隨順現量而起可自悟自悟為依方可悟他故名自悟末顯果于二量中即智名果是證相故如有作用而顯現故亦名為量此節總示量果為有問曰立量定有量果此處無立破能成何者是果答悟他以能立破為果自悟以自證為果于此現比二量中有正智生即此正智得名為果如彼色等為因有正智生因果義成蓋正智者是內證因相之智故即名證果問名為智云何不名比智而名比量答智從內證無作用非顯現然其了別而轉如有作用而顯現故約內證則名智約義相亦名為量地論云其相違者于為成就所立宗義不能為量故不名量不相違者于為成就所立宗義能為正量故名為量無正智生故不名量觀察能成就其義故名為量解深密經云于所成立決定能成當知是名圎成實相實相顯現是得量果問疏鈔云依因明論謂一切法上實義皆名自相以諸法上自相共相各附己體不共他故若分別心立一種類能詮所詮通在諸法如縷貫華名為共相此要心分別假立是比量境一切定心離此分別皆名現量其義與此同否答此雖散心分別正智生故無妨假立若非共相藉誰觀察可言同也彼定中現量此已簡別不攝故以此中二字簡之可言異也五六似現比量門分二初現次比今初有分別智于義異轉名似現量謂諸有智了瓶衣等分別而生由彼于義不以自相為境界故名似現量初似現量有分別乃名種等所有分別假智也于義異轉不似本相者也瓶衣由和集而成分散則無實物假相也一切法上實相名曰自相言似現量者謂詴分別之假智于色等義上異相而轉名相似之現量云何名有分別智謂諸凡夫異生有世俗邪智了知瓶衣等名言分別而生假相云何謂之于義異轉謂由彼邪智于色等義為名種所障不以色等自相為所緣境畍故雖彼自謂了別而轉但名相似現量而已實非量也龍樹因明論云一切世俗有中瓶等𢿘等舉等有性瓶等性智皆似現量此文言瓶衣等等取𢿘舉等一切𢿘者外道𢿘論執𢿘是常舉者舉動屈伸凡夫執此為實疏鈔云男女天地等見一合相名似現量一合相者衆緣和合故攬衆微以成于色合五陰以成于人名一合相如是見者是有分別智于義異轉故名似現此中瓶衣等一合相所攝次似比量若似因智為先所起諸似義智名似比量似因多種如先已用彼為因于似所比諸有智生不能正解名似比量似因之智則非由彼三相之正因似義之智則非所比之實義皆邪智也似因多種者前似能立門所列十四種似因也非正智安能正解言似比量者若以似因之智為先導所起諸般似義之智非正因則不可比非實義則不成量故名似比量所言似因者謂有多種如先前似能立中已經示言為先者謂用彼十四種為因先導其似于似所比之義諸所緣境相有邪智生故曰所起諸似義智謂之似者簡非真正不能正解真實義相但名似比量而已亦非量也七八能似破門分二初能次似今初復次若顯示能立過失名能破謂初能立闕减過性立宗過性不成因性不定因性相違因性及喻過性顯示此言開曉問者故名能破真能破者不圎減則不滿似立宗有九種宗過四種不成因過六種不定因過四種相違因過十種喻過復為論列就前文依次而曰若能顯明開示彼論似能立之過失名能破所言過失者謂此論初條能立方隅不能如法圎滿而有減之過性成似能立所言減者謂立宗過性不成因性不定因性相違因性及似喻過性如前已既有過失如器破不成器用如數減短不成丈尺若能顯示此等過失言辭開列曉喻來問難者則其宗義難立故名真能破斥彼宗破問者自知其非得悟他果過性者過失之體性義性次似能破若不實顯能立過言名似能破謂于圎滿能立顯示減性言于無過宗有過宗言于成就因不成因言于決定因不定因言于不相違因相違因言于無過喻有過喻言如是言名似能破以不能顯他宗過失彼無過故且止斯事似能破翻前真能破前條真能破為能顯示一一過失也若不能依于實義而顯示其能立之過以為言名似能破云何謂之不能實顯謂于彼宗實是圎滿能立乃反顯示其有有減之過性虗駕不實之言辭云何是不實言辭謂于實無過之宗性反有過宗之虗言于成就之因性反不成就因之虗言于決定之因性反不決定因之虗言于不相違之因性反相違因之虗言于無過之喻反有過喻之虗言如是等言不依實有而故名似能破也若彼能立雖然有過或在因而不在喻或宗即有過或顯過不中其窾如因不成而不定或不定而言相違如是等類俱以不能顯示他宗過失皆似破所攝謂彼所斥之處無過失故是以論人若未審知能立能破方隅且止斯破斥之事無得輕對敵者申論問此論重在悟他云何乃言且止斯事答對敵若蹈似能破門一者不能高建法幢則法門有辱二者不能闡佛㫖非佛子孫三者凡外乘隙而入或墮負處有愧僧名即此一舉三寶俱被損壞是以論主于其論末鄭重置言以示警誡若非自悟必犯其過或者自悟而不能𤍨悉因明及無辨才則亦不能悟他反𭠡其我教中人當深體論主此意也末結頌已宣少句義為始立方隅其間理非理妙辨於餘處凡作論者多分造頌以結此末結頌也方者方向隅者四隅知此四方四隅則行路不迷知此因明方隅則論者不誤因明之經論甚多甚多此中所僅一二耳故曰少餘處則多也頌意曰因明㫖趣之經論句義甚多此處論文已宣多分中之少句少義何以故但少句但為始立因明之方隅耳至于廣陳軌範尚未竟其間大乘正宗之正理及破斥凡外宗之非理若欲依因明法則而立破之當觀其妙辨于餘處經論也餘處妙辨契經所已多論主所見諸論亦復不少論主之後復多論列文繁不暇廣引今就粗顯易明之條略引𢿘種聊申問答以為發端問顯論十一云若有依五論莊嚴相興言論者當知復有二十七種稱讚功德第四者于他所宗深知過隙第五者于自所宗知決定德十三者恱可信解因明論者因明有功德如是何故我土比丘言者甚少答西竺外道多有小乘因明重在悟他凡小我土無小乘外道人少智劣不煩摧邪又信心人多不煩顯正故習者少問論又云非義相應者當知有十種第八義不決定第九成立已成既云已成何謂非義相應答彼宗已成我蹈襲量不煩重立即相符極成過於能立義不相應也無功能故無悟他果故問集論云自性假立尋思者謂于諸法能詮所詮相應中推求自體惟是假立言因性差別假立尋思者謂于諸法能詮所詮相應中推求差別唯是假立名言因性是假立云何是因明實相答因明實相惟妙觀察智能本離言智論云如以著心取相五衆無常乃至無生無滅是相似般若若以不著心取相五衆無常但為破常顛倒故不著無常是真實般若可見著心取相建立宗雖合因明亦是相似能立著心破斥敵者亦是相似能破若但為悟他不執己見方名能立能破何以故名言皆是假立因性故問阿毗達摩雜集論說三支比量云比量者謂以有為法與無為法比類而度量也一立宗宗猶主也要也謂如五蘊等法皆假因緣而生實無自性于中求我決不可得故對執我論者先諸法無我也二立因立因者謂破執有我者而立因也若于五蘊等法施設實有我者此之五蘊既從衆緣而生皆是生滅之法蘊既生滅我不成就若離五蘊而于餘處施設有我者我無所因我亦無用是則皆無有我也三立喻謂以別法喻所立法也如于現在世施設實有過去相者此現在相已生未滅不應于已生未滅法中施設過去之相若離現在而于餘處施設過去相者然過去世相滅壞不應施設有相此過去相既不可得以喻諸法皆不可得也如論云云云何立量答五蘊等有法有法求我不可得宗衆緣生滅故因如過去世相喻即是量相問密嚴經云由現量故由比量故由聖教量故由五種相名為清淨地論云由三量故如實觀察謂由至教量故道現量故由比量故由此三量證驗道理諸有智者心正執受安置成立如是等名證成道理經論既三量備舉云何此論獨遺聖教答此論不列聖教有三義一者不當列二者不可列三者不能列不當列者聖教可攝因明因明不能攝聖教聖教攝因明者此因明是聖教中之一端此正理是聖教中之一種處處因明正理即是聖教豈有遺耶地論云若諸菩求因明時為欲如實了知外道所造因論是惡言為欲降伏他諸異論為欲于此真實聖教未淨信者令其淨信已淨信者倍令增廣故菩求因明即是求聖教因明即是聖教又內五明中之內明即是聖教內明可攝因明也因明不能攝教者密嚴經云密嚴佛土是最寂靜是大涅槃是妙解是淨法界亦是智慧及以神通諸𮗚行者所止之處本來常住不壞不滅水不能潤風不能燥非如瓶等勤力所成何以故宗及諸分是不定法諸宗及因各差別故密嚴佛土是轉依識超分別心非諸𡚶情所行之境又華嚴經云解明行者無𢿘非等倫世間諸因量求過不可得清涼云因量者謂諸因諸量因量立量依世俗分別故曰世間今體絶有無故彼莫能過也如佛聲非定有故不同外道立常從法性生離造作故不同菩所立無常三科皆爾豈將佛德判屬無常由二經𮗚之不能攝之證也故諸經論有時不可量有時可量如前二經可量者如華嚴經又云衆生如是某日佛成道如來得菩提實不繫于日如來離分別非世超諸𢿘三世諸導出現皆如是譬如淨日輪不與昏夜合而某日夜諸佛法如是三世一切劫不與如來合而三世佛導法如是如上四偈清涼作六量即一不繫日宗法分立三因第一因約離分別義偈云日體無分別不與昏夜合如來無分別不與三世合量云菩提是有法定不繫時是宗法因云無分別故同喻如日輪與偈合之日體無分別也第二因約非世偈云日不屬于時不與昏夜合佛非世法故不與三世合量云宗喻同前因云體非三世故與偈合之日體非三世也第三因約超諸𢿘偈云日輪無出沒不與昏夜合如來非有為不與三世合立量云菩提是有法定不繫時是宗法因云非有為故同喻如日輪與偈合之日體非有為也又若以超時現時等四句為宗又成三量初量云菩提自有法定不繫日隨機日是宗法因云體無分別不礙分別故同喻如日輪日離分別隨時殊故次量有法宗法如前因云體非三世不礙三世故同喻如日輪日體恆明隨映見殊故第三量有法宗法如前因云體非有為不礙無為故同喻如日輪日非有念隨時殊故此是經中量義也二者不可立謂學人信聖教有二一者聞教思修功行深時以自證智了悟此信受而奉行者二者雖未內證知是金口誠言決定生信不敢不許如是二種何必藉此因量然後隨順故可不陳聖教假如教中弟子已信佛言六根互用即聲非耳所聞豈違現量已信涅槃經即常我豈違自教已信佛天界諸事即魔攝其衆遁藕𢇁中豈違世間法四十九年其中不一字豈違自語此等言辭向內人則可向外人即𭠡量過而此因明之法義重悟他接引凡外之不信者故知聖教量備在內明非因明所攝也問一切道理現量為凖云何論中現量少比量多耶答因明全屬比量而比量所依則在現量比相應多所依冝少又現比二量彼此可攝除現量義無可比量真比量義即是現量不可多少分輕重也問似宗九過前相違五過因喻亦有犯此過者云何似因似喻中不答在似因似喻亦有犯此五過者已從過重處易其名輕者可略如兩俱不成一條立聲無常因云眼所見性犯現量比量世間三相違過義重在因之不成所立法不成一條立聲常宗無質礙故喻如覺亦犯世間相違雖無質而有礙大聲礙聽細語義重在喻之不成所言義重者謂但明此因此喻符此過之式不暇彈他過也其他凖此可推宗鏡録四十九卷云未審三量行相如何又八識各具幾量答古德釋云現量者現謂顯現即分明證境不帶名言無籌度心親得法體離𡚶分別名之謂現言量者量度是楷定之義謂心于境上度量楷定法之自相不錯謬故比量者比謂比類以比類量度而知有故非量者謂心緣境時于境錯亂虗𡚶分別不能正知境不稱心故又現量者如五塵色法是第八識所變相分前五轉識并明了意識緣此之時最初過境未起分別能緣之智親證境體得法自性名為現量得自相也若前五識及第八識于一切境時皆是現量得法自相不簡因果漏無漏位一切皆爾若第六識緣彼五塵境時于彼法體生分別心而起言言所及不能親證以是假智所緣名得共相不簡因中果位但于境體生分別心及起言詮之時皆名得于共相若佛後得智緣事境時起分別故起言故亦是假智非是得彼自相法體但是得彼共相也按此不審佛果安可言假智安可以自相共相分別佛得共相皆自相也後文經云如來一切現量所得非比量知則知此之非矣又云因明疏解現量義略有二解一現之量謂前五識依所依根于現在世緣現有境根與識同前境有發識用根義顯勝得顯現名雖于境以體是色無緣用不能量度但有現義不得量名唯心心所量度于境緣用增體具現義亦有量境之能今從能發之根顯所發識名現之量依主釋也二現即量謂明了意識一分除餘散意識及獨頭起者并取定意識及第八識能緣見分親緣現境作用顯現而彼所依意根界體非顯現故故不取之但就能緣見分現即是量持業釋也又云問若假智所詮但得共相之義不得共相法體如口色時口應被礙以彼色體以質礙為自相故既不被色礙故知不得彼體但得彼義者且如第八識及與眼識并明了意識現量智起緣火之時既言現量得法自相寧不燒心若不被燒應不得火自相何名現量境也若許被燒即世間現見火時眼不被損便有世間現量相違過答曰雖不被燒亦得自相名為現量所以者何以心細色粗故心細無狀色粗有形故緣火時雖不被燒亦名現量又彼粗色實亦不能壞于細色何况心法如火災起時欲畍但燒自界不燒色畍定地殊妙細色問言心細色粗如阿羅漢化火焚身心智隨滅此如何通答曰化火㷊身但燒浮塵根非燒清淨色根及彼心智彼清淨根心智以無所依浮塵緣闕不生得非擇滅雖是定火亦不能燒粗細異故定火對世火較細而對心猶粗以是色法有形質故按此假所全成戲論口是聲色體安有被礙眼是見火不燒見心量其法是知火不燒知若舌身二根識緣火寧不被燒又粗細之亦非合理江河水大亦潤一塵一星之火不容寸鐵又界有各別彼此無𮤚人間之火不燒地獄水雖清淨鬼見是膿豈人間水火粗地獄鬼類反細耶又魂無塵根可依而見色聞香心智不滅羅漢涅槃依方便有餘土心智不滅若言有滅便是斷見不應以擇滅之滅為例定火豈有形質定火與心豈可較量粗細此等分別俱為贅疣凡宗鏡録所談唯識一門佳處固多敗闕處亦復間出學者當分別觀之無一一泥其所說若以此解經反晦經㫖當永明時所慿以談唯識之見未甚精其中嘉禾與稂莠雜陳而唯識宗義相繁碎永已獲驪珠不復辨其鱗甲以故一皆𭠎入録中學者又不得以未辨牝牡驪黃誚九方歅之不能相馬也又云三量八識分別者前五轉識唯是現量以前五識顯現真境不作行解心得法自性任運轉故第六意識遍通三量有二一明了意識與五同緣通三量初念得五塵自性是現量第二念至作解心時若量境不謬是比量若心所不稱境知即是非量二獨頭意識有三一𣪚位獨頭亦通三量而比非為多若前五引起獨散意識名現量謂第一念緣前來五識所緣塵境得其自性者二定中獨頭惟是現量三夢中獨頭惟是非量內二分是現量第七末那約有漏位中惟是非量𡚶執第八見分為我法故本來第八見分是白淨無記然非是我今被第七𡚶執為我不稱境知故名非量若第七內二分惟現量凡位心心所若具四義則名現量一任運緣二不帶名言三惟性境四無計度分別第八識四義具足極成現量按此文中意識之見分惟是非量此語有疵前五引起獨散意識及定中獨頭豈闕見分耶又心所五位作意便非任運想且思即落計度而八識同有心心所法現與比如何判得又問真似現量如何分別答古釋現量有二一真二似真現量者謂五識及五俱意識諸自證分諸定心及第八識此等諸心心所有六義名現一現有簡龜毛等二現在簡過未三顯現簡種子無作用故四現離現謂能緣之心行相離諸分別故謂離隨念計度名言種類諸門等分別心故因明疏云無分別者即顯能緣行相不籌不度任運因循符前境故五明現謂諸定心澄湛隨緣何境皆明證故六親現謂親冥自體如一切散心若親于境明冥自體皆名現量第五第六簡諸邪智等如病眼見空華毛輪等雖離分別任運而緣然不能明證衆境親冥自體故非現量也似現量者約有五種一散心緣過去二獨頭意緣現在三散意緣未來四緣三世疑智五緣現在諸惑亂解又隨先所受分別轉故名似現量然有二種一無分別心謂愚癡輩及見空等不能分明冥證境故二有分別心現帶名言不得自相故又男女天地等見一合相名似現量此以衆緣合故如攬衆微以成于色合五行以成于人名一合相如是見者是有分別智于義異轉故名似現量真現量者如一合相相不可得金剛經云如來一合相即非一合相以從緣合即無性故無性之性是所證理如是知者是正智生是自相處之相名真現量又拂能所證之跡為真現量謂若有如外之智與如合者猶有所得非真實證能所兩方為真現唯識頌云若時于所緣智都無所得爾時住唯識離二取相故經云亦無如外智能證于如乃為真現量也是以諸佛施為悉皆現量如守護國界主陀羅尼經云如來悉知彼諸衆生出息入息種種飲食種種資具種種相貌種種根器種種行種種心性死此生彼剎那流注生滅相續如來悉知如是一切現量所得非比量知云何現量謂不動念如實而知非流注心入于過去如是知時智慧具足隨衆生心種種法按文中前六種第一至三現現可攝第四至六別轉可攝似現五種翻前可推次似現二種之無分別心似與論文有違然論文即表智則不違後所謂無分別者非是不能分別而無後直作不能分別講則過矣一合相不可得拂能所迹諸佛施為皆無分別可攝然是不共之清淨現量非此論現量義
